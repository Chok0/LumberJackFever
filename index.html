<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumberjack Fever — Proto v13</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a0e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
#gc{position:relative;transform-origin:center center}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#light{position:absolute;top:0;left:0;pointer-events:none;mix-blend-mode:multiply}
#fx{position:absolute;top:0;left:0;pointer-events:none}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;display:flex;justify-content:space-between;padding:8px;z-index:5}
.pn{background:rgba(5,12,8,.9);border:1px solid #2d6a4f;border-radius:3px;padding:5px 9px;color:#b7e4c7;font-size:11px;line-height:1.5}
#hlp{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);background:rgba(5,12,8,.65);border:1px solid #2d6a4f;border-radius:3px;padding:2px 10px;color:#74c69d;font-size:9px;pointer-events:none;z-index:5}
#shp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,16,10,.95);border:2px solid #52b788;border-radius:6px;padding:18px;color:#b7e4c7;font-size:12px;display:none;pointer-events:all;min-width:380px;max-width:480px;z-index:10}
#shp h2{color:#52b788;margin-bottom:8px;text-align:center;font-size:14px;letter-spacing:1px}
#dlg{display:none;margin-bottom:10px}
#dlg-box{display:flex;gap:10px;align-items:flex-start}
#dlg-portrait{width:80px;height:80px;image-rendering:pixelated;border:2px solid #2d6a4f;border-radius:4px;flex-shrink:0;background:#0a1a10}
#dlg-right{flex:1;min-width:0}
#dlg-name{color:#52b788;font-size:11px;font-weight:bold;margin-bottom:4px;letter-spacing:1px}
#dlg-text{color:#d8f3dc;font-size:11px;line-height:1.5;min-height:36px;max-height:54px;overflow:hidden}
#dlg-next{display:block;margin:6px auto 0;background:#1b4332;color:#74c69d;border:1px solid #40916c;padding:2px 14px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:9px}
#dlg-next:hover{background:#2d6a4f}
.si{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1b4332}.si:last-child{border:none}
.sb{background:#1b4332;color:#d8f3dc;border:1px solid #40916c;padding:2px 8px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:10px}.sb:hover{background:#2d6a4f}.sb:disabled{opacity:.3;cursor:default}
#dth{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(18,4,4,.95);border:2px solid #8b0000;border-radius:6px;padding:18px;color:#e74c3c;font-size:12px;display:none;text-align:center;pointer-events:all;z-index:10}
.br{display:inline-block;width:68px;height:6px;background:#111;border:1px solid #333;border-radius:2px;vertical-align:middle;margin-left:3px;overflow:hidden}
.bf{display:block;height:100%;border-radius:1px;transition:width .12s}
#mm{position:absolute;bottom:28px;right:8px;border:1px solid #2d6a4f;pointer-events:none;z-index:5;opacity:.85}
#time-ind{position:absolute;top:8px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:5;color:#b7e4c7;font-size:10px;background:rgba(5,12,8,.7);border:1px solid #2d6a4f;border-radius:3px;padding:2px 8px}
#editor{position:fixed;top:0;right:0;width:360px;height:100vh;background:rgba(5,12,8,.96);border-left:2px solid #52b788;overflow-y:auto;z-index:100;display:none;color:#b7e4c7;font-size:10px;padding:8px;font-family:'Courier New',monospace;pointer-events:all}
#editor h3{color:#52b788;font-size:12px;margin:10px 0 4px;border-bottom:1px solid #1b4332;padding-bottom:3px;cursor:pointer;user-select:none}
#editor h3:hover{color:#74c69d}
#editor h3::before{content:'▼ ';font-size:9px}
#editor h3.collapsed::before{content:'▶ ';font-size:9px}
.ed-row{display:flex;align-items:center;justify-content:space-between;padding:2px 0;gap:4px}
.ed-row label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#8fb}
.ed-row input[type=range]{width:80px;accent-color:#52b788;height:12px}
.ed-row input[type=number]{width:52px;background:#0a1a10;border:1px solid #2d6a4f;color:#b7e4c7;font-size:10px;padding:1px 3px;font-family:inherit;border-radius:2px}
.ed-row .ed-val{width:38px;text-align:right;color:#74c69d;font-size:9px}
#editor .ed-section{padding-left:4px;overflow:hidden;transition:max-height .3s}
#editor .ed-btn{background:#1b4332;color:#d8f3dc;border:1px solid #40916c;padding:3px 8px;border-radius:2px;cursor:pointer;font-family:inherit;font-size:10px;margin:2px}
#editor .ed-btn:hover{background:#2d6a4f}
#editor .ed-top{display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;border-bottom:1px solid #52b788;margin-bottom:4px}
#editor .ed-top h2{color:#52b788;font-size:13px;margin:0}
</style>
</head>

<div id="gc">
<canvas id="c"></canvas>
<canvas id="light"></canvas>
<canvas id="fx"></canvas>
<canvas id="mm" width="128" height="112"></canvas>

<div id="intro-cin" style="position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer">
  <canvas id="intro-canvas" width="480" height="270" style="image-rendering:pixelated;width:480px;height:270px"></canvas>
  <div id="intro-text" style="color:#b7e4c7;font-family:monospace;font-size:13px;max-width:440px;text-align:center;margin-top:16px;line-height:1.6;min-height:80px"></div>
  <div id="intro-skip" style="color:#52b788;font-family:monospace;font-size:9px;margin-top:20px;opacity:.5">Cliquer ou appuyer Espace pour passer</div>
</div>
</div>
<div id="editor">
<div class="ed-top"><h2>🎮 Éditeur</h2><div><button class="ed-btn" onclick="applyTuning()">Appliquer</button><button class="ed-btn" onclick="resetTuning()">Reset</button><button class="ed-btn" onclick="exportTuning()">Export JSON</button></div></div>
<div id="ed-content"></div>
</div>
<script>
// ============ TUNING SYSTEM ============
const TUNING = {
  // -- Corruption (gradual: visible ~3min, dangerous ~10min) --
  corrMinCluster: 5,             // need 5 adjacent stumps (was 3)
  corrSpreadRate: 0.004,         // slow spread (was 0.018)
  corrSpreadRadius: 3,           // tighter radius (was 4)
  corrPassiveGrowth: 0.0000008,  // slower passive growth (was 0.000003)

  bagUpgradeCost3: 200,

  wolfSpawnCooldown: 30,     // seconds between spawn attempts

  gmHealthDecay: 0.015,       // health loss per second (~1.5/min, dies in ~66min without meds)
  gmMedicineCost: 25,         // gold cost per medicine dose
  gmMedicineHeal: 40,         // health restored per dose
  gmSacredSapHeal: 60,        // health from Ylva's sacred sap remedy (free but hard)
  // -- Contracts --
  contractTimeLimit: 120,
  contractBonusMult: 2.0,
  contractLatePenalty: 0.5,
  // -- Herbs & Mushrooms --
  herbsForPotions: 5,
  mushsForEncens: 5,
  herbsPerClearing: 2,       // herbs spawned per clearing
  mushsPerClearing: 1,       // mushrooms spawned per clearing
  // -- Sacred Tree Aura --
  sacredAuraRadius: 8,        // tiles of anti-corruption protection
  sacredMiniBossHp: 15,       // HP of sacred tree guardian mini-boss
  sacredMiniBossDmg: 3,
  // -- Purification (enhanced) --
  purifyEssenceCost: 2,       // spiritual essences per ritual
  purifySapCost: 3,           // sap per ritual
  purifyRadius: 10,           // tile radius of purification
  // -- Replanting --
  seedBagWeight: 1,           // bag space per seed
  jardinierSeedCount: 20,     // seeds given by Ermite Jardinier
  plantedRegrowTime: 1,       // day/night cycles before regrow after cut (1 cycle)
  seedGrowTime: 1,            // day/night cycles for seed→tree
  // -- Instruments --
  instrumentBagWeight: 2,     // bag space per instrument
};
const TUNING_DEFAULT = JSON.parse(JSON.stringify(TUNING));
const TUNING_META = {
  'corrMinCluster': {min:2,max:12,step:1,cat:'Corruption',label:'Seuil cluster (stumps)'},
  'corrSpreadRate': {min:0.0005,max:0.02,step:0.0005,cat:'Corruption',label:'Vitesse propagation'},
  'corrSpreadRadius': {min:1,max:6,step:0.5,cat:'Corruption',label:'Rayon propagation'},
  'corrPassiveGrowth': {min:0,max:0.000005,step:0.0000001,cat:'Corruption',label:'Croissance passive'},
  'corrDensityRadius': {min:2,max:8,step:1,cat:'Corruption',label:'Rayon densité check'},
  'corrDensityThreshold': {min:0.05,max:0.5,step:0.01,cat:'Corruption',label:'Seuil densité (ratio)'},
  'playerBaseHp': {min:1,max:20,step:1,cat:'Joueur',label:'PV de base'},
  'playerBaseStamina': {min:50,max:300,step:10,cat:'Joueur',label:'Stamina de base'},
  'playerSpeed': {min:1,max:8,step:0.5,cat:'Joueur',label:'Vitesse'},
  'dashSpeedMult': {min:1.5,max:5,step:0.5,cat:'Joueur',label:'Multiplicateur dash'},
  'dashStaCost': {min:10,max:80,step:5,cat:'Joueur',label:'Coût stamina dash/s'},
  'cutStaCost': {min:3,max:30,step:1,cat:'Joueur',label:'Coût stamina par coup'},
  'cutCooldown': {min:0.1,max:1,step:0.05,cat:'Joueur',label:'Cooldown coupe (s)'},
  'staRegen': {min:10,max:80,step:5,cat:'Joueur',label:'Regen stamina/s'},
  'baseBagSize': {min:10,max:80,step:5,cat:'Économie',label:'Taille sac initiale'},
  'bagUpgradeAmount': {min:5,max:30,step:5,cat:'Économie',label:'Sac: gain par upgrade'},
  'sapSellChamane': {min:1,max:20,step:1,cat:'Économie',label:'Prix sève (Chamane)'},
  'sapSellTaverne': {min:1,max:20,step:1,cat:'Économie',label:'Prix sève (Taverne)'},
  'loanAmount': {min:10,max:200,step:10,cat:'Économie',label:'Montant prêt'},
  'loanDebt': {min:20,max:300,step:10,cat:'Économie',label:'Dette du prêt'},
  'debtInterestRate': {min:0,max:0.1,step:0.005,cat:'Économie',label:'Intérêt dette/min'},
  'axeCost1': {min:20,max:300,step:10,cat:'Haches',label:'Coût hache Niv.2'},
  'axeCost2': {min:100,max:800,step:25,cat:'Haches',label:'Coût hache Niv.3'},
  'axeCost3': {min:300,max:2000,step:50,cat:'Haches',label:'Coût hache Niv.4'},
  'wildlifeMaxDeer': {min:0,max:12,step:1,cat:'Faune',label:'Max cerfs'},
  'wildlifeMaxRabbit': {min:0,max:16,step:1,cat:'Faune',label:'Max lapins'},
  'wildlifeMaxBird': {min:0,max:20,step:1,cat:'Faune',label:'Max oiseaux'},
  'wildlifeFleeRadius': {min:2,max:12,step:1,cat:'Faune',label:'Rayon fuite joueur'},
  'wildlifeNoiseFleeRadius': {min:4,max:24,step:2,cat:'Faune',label:'Rayon fuite bruit'},
  'sacredPerBiome': {min:0,max:5,step:1,cat:'Arbres',label:'Sacrés par biome'},
  'enemyMaxBase': {min:4,max:30,step:2,cat:'Ennemis',label:'Max ennemis base'},
  'enemyCutsScaling': {min:0,max:1,step:0.1,cat:'Ennemis',label:'Scaling / coupe'},
  'wolfMaxPacks': {min:1,max:6,step:1,cat:'Loups',label:'Max meutes'},
  'wolfHp': {min:1,max:6,step:1,cat:'Loups',label:'PV loup'},
  'wolfSpeed': {min:0.5,max:3,step:0.1,cat:'Loups',label:'Vitesse loup'},
  'wolfDmg': {min:1,max:4,step:1,cat:'Loups',label:'Dégâts loup'},
  'wolfAggroRadius': {min:4,max:16,step:1,cat:'Loups',label:'Rayon aggro'},
  'wolfNightThreshold': {min:0.1,max:0.6,step:0.05,cat:'Loups',label:'Seuil nuit (spawn)'},
  'wolfSpawnCooldown': {min:10,max:120,step:5,cat:'Loups',label:'Cooldown spawn (s)'},
  'contractTimeLimit': {min:60,max:600,step:30,cat:'Contrats',label:'Temps limite (s)'},
  'contractBonusMult': {min:1.2,max:4,step:0.2,cat:'Contrats',label:'Bonus prix (×)'},
  'contractLatePenalty': {min:0.1,max:0.9,step:0.1,cat:'Contrats',label:'Pénalité retard (×)'},
};
let editorOpen = false;

function buildEditor(){
  const cont = document.getElementById('ed-content');
  const cats = {};
  for(const[key,meta] of Object.entries(TUNING_META)){
    if(!cats[meta.cat]) cats[meta.cat] = [];
    cats[meta.cat].push({key,meta});
  }
  let html = '';
  for(const[cat,items] of Object.entries(cats)){
    html += `<h3 onclick="toggleEdSection(this)">${cat}</h3><div class="ed-section">`;
    for(const{key,meta} of items){
      const v = TUNING[key];
      const isFloat = meta.step < 1;
      const displayVal = isFloat ? v.toFixed(Math.max(1,-Math.floor(Math.log10(meta.step))+1)) : v;
      html += `<div class="ed-row">
        <label title="${key}">${meta.label}</label>
        <input type="range" id="ed_${key}" min="${meta.min}" max="${meta.max}" step="${meta.step}" value="${v}" oninput="edSlide('${key}',this.value)">
        <span class="ed-val" id="ev_${key}">${displayVal}</span>
      </div>`;
    }
    html += '</div>';
  }
  html += `<h3 onclick="toggleEdSection(this)">Stats temps réel</h3><div class="ed-section"><div id="ed-stats" style="padding:4px;font-size:9px;color:#74c69d"></div></div>`;
  cont.innerHTML = html;
}
function edSlide(key,val){
  const meta = TUNING_META[key];
  const v = meta.step<1 ? parseFloat(val) : parseInt(val);
  TUNING[key] = v;
  const isFloat = meta.step < 1;
  document.getElementById('ev_'+key).textContent = isFloat ? v.toFixed(Math.max(1,-Math.floor(Math.log10(meta.step))+1)) : v;
}
function toggleEdSection(h3){
  h3.classList.toggle('collapsed');
  const sec = h3.nextElementSibling;
  sec.style.display = sec.style.display==='none'?'':'none';
}
function applyTuning(){
  // Apply tuning to live game state
  P.spd = TUNING.playerSpeed;
  if(P.mhp < TUNING.playerBaseHp){P.mhp = TUNING.playerBaseHp; P.hp = Math.min(P.hp, P.mhp);}
  if(P.msta < TUNING.playerBaseStamina) P.msta = TUNING.playerBaseStamina;
  ft2(P.x, P.y, '✅ Appliqué', '#52b788');
}
function resetTuning(){
  Object.assign(TUNING, JSON.parse(JSON.stringify(TUNING_DEFAULT)));
  buildEditor();
  ft2(P.x, P.y, '↩️ Reset', '#e9c46a');
}
function exportTuning(){
  const json = JSON.stringify(TUNING, null, 2);
  navigator.clipboard.writeText(json).then(()=>ft2(P.x,P.y,'📋 Copié!','#52b788'));
}
function updateEdStats(){
  const el = document.getElementById('ed-stats');
  if(!el || !editorOpen) return;
  const wl = wildlife||[];
  const corrTiles = _corrSources.length;
  el.innerHTML = `Coupes: ${cuts} · Ennemis: ${ents.length} · Loups: ${wolves.length} · Sources corr: ${corrTiles}<br>` +
    `Faune: 🦌${wl.filter(w=>w.tp==='deer').length} 🐇${wl.filter(w=>w.tp==='rabbit').length} 🐦${wl.filter(w=>w.tp==='bird').length}<br>` +
    `Or: ${P.g} · Bois: ${P.w} · Sève: ${P.sap} · Dette: ${P._debt||0}<br>` +
    `🧪${P._potions||0} · 🌀${P._encensStock||0} · Stamina: ${Math.floor(P.sta)}/${P.msta} · HP: ${P.hp}/${P.mhp}<br>` +
    `Sac: ${invUsed()}/${P.invCap} · Hache: Niv.${P.axe} · Temps: ${Math.floor(gt)}s` +
    (P._contract?`<br>📜 Contrat: ${P._contract.amount}×${P._contract.name} (${Math.max(0,Math.floor(P._contract.deadline-gt))}s)`:'');
}
const CV=document.getElementById('c'),X=CV.getContext('2d');
const LCV=document.getElementById('light'),LX=LCV.getContext('2d');
const FCV=document.getElementById('fx'),FX=FCV.getContext('2d');
const T=32,VW=22,VH=13,SC=2,MW=256,MH=220;
CV.width=LCV.width=FCV.width=VW*T*SC;
CV.height=LCV.height=FCV.height=VH*T*SC;
[X,LX,FX].forEach(c=>c.imageSmoothingEnabled=false);

// Tile types: essences have their own IDs
const TT={G:0,ST:4,VL:5,SH:6,PA:7,TJ:8,BU:9,FL:10,RK:11,WA:12,
  NOI:20,AUL:21,BOU:22,ERA:23, // Lisière
  PIN:30,FRE:31,CHE:32,HET:33, // Forêt Mixte
  IFS:34,TIL:35, // Forêt Ancienne (If = Taxus/Yew, Tilleul)

  WELL:50,FENCE:51,CRATE:52,LAMP:53,SIGN:54,CART:55,
  // Collectibles (clearings)
  HERB:60,MUSH:61,
  PRIM:70,SAP_T:71,
  // Marécage trees
  EBE:80,PAL:81,BDR:82,CYP:83,MAN:84,
  // Boréal trees  
  EPI:90,MEL:91,SAP_B:92,BPB:93,
  // Rare
  ERO:95, // Érable ondé (forêt mixte rare)
  // Luthier
  LUTH:48,
  // New systems
  ARBRE_CHANT:100, // Arbre-Chant unique sacred tree (player-planted)
  SEED_TILE:101,   // Growing seed (sapling from Jardinier seeds)
  BROKEN_AXE:102,  // Broken legendary axe (world pickup — stuck in stump)
  CABIN_ABAND:103, // Abandoned cabin (deep forest clearing scene)
  DOCTOR:104,      // Doctor NPC (arrives after first contract)
  RIVER:105,       // River tile (flowing water, interactable for raft)
  BRIDGE:106,      // Bridge over river (walkable)
  ARCHITECT:107,   // Architect NPC (arrives on first river sighting)
  VIL_BARRICADE:108, // Village barricade (protection from corruption mobs)
  HERM_E:110,      // Estelle — Combat Hermit
  HERM_J:111,      // Ermite Jardinier
  HERM_T:112,      // Ermite Triste
};
// Essence data lookup
const ESS={
  [TT.NOI]:{name:'Noisetier',hp:2,wood:1,gold:1,sap:0,regrow:900,spr:'noi',noise:.3,leaf:0,minAxe:1},
  [TT.AUL]:{name:'Aulne',hp:2,wood:2,gold:1,sap:0,regrow:1200,spr:'aul',noise:.3,leaf:0,minAxe:1},

let _actx=null,_musicOn=true,_sfxOn=true,_musicVol=.25,_sfxVol=.4;
let _musicGain=null,_sfxGain=null;
function initAudio(){
  if(_actx)return;
  _actx=new(window.AudioContext||window.webkitAudioContext)();
  _musicGain=_actx.createGain();_musicGain.gain.value=_musicVol;_musicGain.connect(_actx.destination);
  _sfxGain=_actx.createGain();_sfxGain.gain.value=_sfxVol;_sfxGain.connect(_actx.destination);
}
// --- SFX primitives ---
function sfxNote(freq,dur,type,vol,delay){
  if(!_actx||!_sfxOn)return;
  const t=_actx.currentTime+(delay||0);
  const o=_actx.createOscillator(),g=_actx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime((vol||1)*_sfxVol,t);
  g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g);g.connect(_sfxGain);
  o.start(t);o.stop(t+dur);
  o.onended=()=>{o.disconnect();g.disconnect()};
}
function sfxNoise(dur,vol,delay){
  if(!_actx||!_sfxOn)return;
  const t=_actx.currentTime+(delay||0);
  const buf=_actx.createBuffer(1,Math.floor(_actx.sampleRate*dur),_actx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(vol||.3);
  const src=_actx.createBufferSource(),g=_actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime((vol||.3)*_sfxVol,t);
  g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(g);g.connect(_sfxGain);
  src.start(t);src.stop(t+dur);
  src.onended=()=>{src.disconnect();g.disconnect()};
}

let _musicPlaying=false,_musicTimer=null;
const NOTE_FREQ={C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,R:0};
function playMusicNote(freq,dur,type,vol){
  if(!_actx||!_musicOn||freq===0)return;
  const t=_actx.currentTime;
  const o=_actx.createOscillator(),g=_actx.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime((vol||.12)*_musicVol,t);
  g.gain.setValueAtTime((vol||.12)*_musicVol,t+dur*.7);
  g.gain.linearRampToValueAtTime(0,t+dur*.95);
  o.connect(g);g.connect(_musicGain);
  o.start(t);o.stop(t+dur);
  o.onended=()=>{o.disconnect();g.disconnect()};
}
// Melody: Nordic folk feel in A minor, 4/4 time
const MELODY=[
  'A3','C4','E4','C4', 'A3','C4','E4','G4',
  'F4','E4','D4','C4', 'D4','E4','C4','R',
  'A3','C4','E4','A4', 'G4','E4','D4','C4',

// Bass line (root notes, longer)
const BASS=[
  'A3','A3','A3','A3', 'A3','A3','A3','A3',
  'F3','F3','F3','F3', 'G3','G3','C3','C3',
  'A3','A3','A3','A3', 'C3','C3','G3','G3',

let _mStep=0;
const BPM=110,BEAT=60/BPM;
function musicTick(){
  if(!_actx||!_musicOn||!_musicPlaying)return;
  const nLen=BEAT*.5; // eighth notes
  // Melody
  const mNote=MELODY[_mStep%MELODY.length];
  if(mNote!=='R') playMusicNote(NOTE_FREQ[mNote],nLen*.9,'square',.14);
  // Bass (every 2 melody notes)
  if(_mStep%2===0){
    const bNote=BASS[(_mStep/2|0)%BASS.length];
    if(bNote!=='R') playMusicNote(NOTE_FREQ[bNote],nLen*1.8,'triangle',.1);
  }
  // Light percussion every 4 notes
  if(_mStep%4===0) sfxNoise(.02,.04);
  if(_mStep%4===2) sfxNoise(.015,.02);
  _mStep++;
  _musicTimer=setTimeout(musicTick,nLen*1000);
}
function startMusic(){
  if(_musicPlaying)return;
  initAudio();_musicPlaying=true;_mStep=0;musicTick();
}
function stopMusic(){_musicPlaying=false;if(_musicTimer){clearTimeout(_musicTimer);_musicTimer=null}}
function toggleMusic(){if(_musicPlaying)stopMusic();else startMusic();return _musicPlaying}
function toggleSfx(){_sfxOn=!_sfxOn;return _sfxOn}

const px=(x,X,Y,c)=>{x.fillStyle=c;x.fillRect(X,Y,1,1)};
const rc=(x,X,Y,W,H,c)=>{x.fillStyle=c;x.fillRect(X,Y,W,H)};

function dithEllipse(cx,ex,ey,rx,ry,cols,seed,dither=true){
  for(let y=-ry;y<=ry;y++){
    const hw=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry))));
    for(let x=-hw;x<=hw;x++){
      const dist=Math.sqrt((x*x)/(rx*rx)+(y*y)/(ry*ry));
      let ci=Math.abs((x*7+y*13+seed)%cols.length);
      if(dither&&dist>.7){const n=Math.sin(x*12.9898+y*78.233+seed)*43758.5453;if((n-Math.floor(n))>1-(dist-.7)*2.5)continue}
      px(cx,ex+x,ey+y,cols[ci]);
    }
  }
}

// Improved: layered canopy with depth shading
function layeredCanopy(cx,ex,ey,rx,ry,cols,seed){
  // Back layer (darker)
  const darkCols=cols.map(c=>{const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`rgb(${Math.floor(r*.6)},${Math.floor(g*.6)},${Math.floor(b*.6)})`});
  dithEllipse(cx,ex+1,ey+2,rx,ry,darkCols,seed+100);
  // Mid layer
  dithEllipse(cx,ex,ey,Math.floor(rx*.9),Math.floor(ry*.9),cols,seed);
  // Front highlight
  const lightCols=cols.slice(0,3).map(c=>{const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`rgb(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+20)})`});
  dithEllipse(cx,ex-1,ey-Math.floor(ry*.3),Math.floor(rx*.5),Math.floor(ry*.4),lightCols,seed+50);
}

function getDayState(){
  const p=dayPhase;
  if(p<0.08){// deep night - short
    const t=p/0.08;
    const pulse=Math.sin(t*Math.PI)*.03;
    return{sun:0,r:Math.floor(4+pulse*10),g:Math.floor(3+pulse*5),b:Math.floor(10+pulse*15),tint:'#050310',name:'🌙 Nuit',fog:.2,nightMul:.92};
  }else if(p<0.14){// pre-dawn
    const t=(p-0.08)/0.06;
    return{sun:t*.08,r:Math.floor(4+t*18),g:Math.floor(3+t*10),b:Math.floor(10+t*25),tint:lerpC('#050310','#1a0830',t),name:'🌙 Aube naissante',fog:.12*(1-t*.5),nightMul:.92-.42*t};
  }else if(p<0.20){// dawn
    const t=(p-0.14)/0.06;
    const t2=t*t*(3-2*t);
    return{sun:t2*.35,r:Math.floor(22+t2*130),g:Math.floor(13+t2*75),b:Math.floor(35+t2*30),tint:lerpC('#1a0830','#d4756a',t2),name:'🌅 Aube',fog:.08*(1-t2),nightMul:.5*(1-t2)};
  }else if(p<0.30){// morning
    const t=(p-0.20)/0.10;
    return{sun:.35+t*.45,r:Math.floor(152+t*48),g:Math.floor(88+t*92),b:Math.floor(65+t*100),tint:lerpC('#d4756a','#d8e4e0',t),name:'☀️ Matin',fog:0,nightMul:0};
  }else if(p<0.60){// long noon/day
    const t=(p-.30)/.30;
    return{sun:.8+Math.sin(t*Math.PI)*.2,r:210,g:200,b:195,tint:'#e4ece8',name:'☀️ Journée',fog:0,nightMul:0};
  }else if(p<0.75){// afternoon
    const t=(p-0.60)/0.15;
    return{sun:.8-.25*t,r:Math.floor(210-t*35),g:Math.floor(200-t*55),b:Math.floor(195-t*55),tint:lerpC('#e4ece8','#e8a850',t),name:'🌤️ Après-midi',fog:0,nightMul:0};
  }else if(p<0.88){// dusk
    const t=(p-0.75)/0.13;
    const t2=t*t*(3-2*t);
    return{sun:.55-.55*t2,r:Math.floor(175-t2*148),g:Math.floor(145-t2*128),b:Math.floor(140-t2*105),tint:lerpC('#e8a850','#200820',t2),name:'🌆 Crépuscule',fog:.03*t2,nightMul:t2*.7};
  }else{// nightfall - quick
    const t=(p-0.88)/0.12;
    const t2=t*t;
    return{sun:0,r:Math.floor(27-t2*23),g:Math.floor(17-t2*14),b:Math.floor(35-t2*25),tint:lerpC('#200820','#050310',t2),name:'🌙 Nuit tombante',fog:.06+t2*.14,nightMul:.7+t2*.22};
  }
}

function lerpC(a,b,t){
  const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  return`rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

// All tree/entity sprites use mkHD (2× resolution with native detail)
// Helper: procedural bark at HD res
function hdBark(c,x0,y0,w,h,cols,seed){
  for(let y=y0;y<y0+h;y++) for(let x=x0;x<x0+w;x++){
    const ci=Math.abs((x*5+y*3+seed)%cols.length);
    px(c,x,y,cols[ci]);
    // Fine vertical furrows
    if(((x-x0+Math.floor(Math.sin(y*.4+seed)*2))%(Math.max(3,Math.floor(w/4))))===0)
      px(c,x,y,cols[Math.min(cols.length-1,(ci+2))]);
    // Horizontal crack detail
    const n=Math.sin(x*8.3+y*4.1+seed)*43758.5;
    if((n-Math.floor(n))>.92) px(c,x,y,'#2a1608');
    // Fine grain between main pixels
    if((x+y)%3===0){
      const n2=Math.sin(x*15.7+y*9.3+seed)*43758.5;
      if((n2-Math.floor(n2))>.7) px(c,x,y,`rgba(90,60,30,0.15)`);
    }
  }
  // Lichen patches
  for(let i=0;i<Math.floor(w*h/60);i++){
    const lx=x0+Math.floor(Math.sin(seed+i*7)*w*.4)+Math.floor(w/2);
    const ly=y0+Math.floor(Math.cos(seed+i*5)*(h*.4))+Math.floor(h/2);
    if(lx>=x0&&lx<x0+w&&ly>=y0&&ly<y0+h)
      px(c,lx,ly,['rgba(120,145,80,0.25)','rgba(100,130,70,0.2)','rgba(140,155,90,0.22)'][i%3]);
  }
}
// HD canopy: multi-layer with edge leaves and branch tips
function hdCanopy(c,cx,cy,rx,ry,lCols,dCols,hCols,seed,branches){
  // Shadow layer
  dithEllipse(c,cx+2,cy+4,rx+2,ry+2,dCols,seed+100);
  // Main mass
  dithEllipse(c,cx,cy,rx,ry,lCols,seed);
  // Mid highlight
  dithEllipse(c,cx-2,cy-Math.floor(ry*.3),Math.floor(rx*.7),Math.floor(ry*.6),lCols.slice(0,4),seed+30);
  // Top highlight
  dithEllipse(c,cx-2,cy-Math.floor(ry*.45),Math.floor(rx*.4),Math.floor(ry*.3),hCols,seed+60);
  // Edge leaf clusters (irregular silhouette)
  for(let i=0;i<14+Math.floor(rx/3);i++){
    const a=i/(14+Math.floor(rx/3))*Math.PI*2;
    const r2=rx*(0.82+Math.sin(a*4+seed)*0.22);
    const lx=Math.round(cx+Math.cos(a)*r2);
    const ly=Math.round(cy+Math.sin(a)*r2*.7);
    const cls=i<7?hCols:lCols;
    // Individual leaf shape (3-5 px clusters)
    for(let j=0;j<3;j++){
      const ox=Math.round(Math.cos(a+j*.5)*2);
      const oy=Math.round(Math.sin(a+j*.5)*1.5);
      px(c,lx+ox,ly+oy,cls[(i*3+j)%cls.length]);
    }
  }
  // Branch tips peeking out
  if(branches) branches.forEach(([bx,by,dx,dy,bl])=>{
    for(let i=0;i<bl;i++){
      px(c,Math.round(bx+dx*i),Math.round(by+dy*i),'#6B4226');
      px(c,Math.round(bx+dx*i),Math.round(by+dy*i)-1,'#8a6848');
    }
  });
  // Undershadow dots
  for(let x=cx-rx+4;x<cx+rx-4;x+=2) px(c,x,cy+ry,'rgba(5,20,10,0.18)');
}
// HD fine moss on trunk
function hdMoss(c,x0,y0,w,count,seed){
  const mc=['#40916c','#2d6a4f','#52b788','#358a55','#48a068','#3d8b5e'];
  for(let i=0;i<count;i++){
    const mx=x0+Math.floor(Math.sin(seed+i*5)*w*.4)+Math.floor(w/2);
    const my=y0+Math.floor(Math.cos(seed+i*3)*3);
    px(c,mx,my,mc[i%mc.length]);
    px(c,mx+1,my,mc[(i+1)%mc.length]);
    // Fine moss tendril
    if(i%2===0) px(c,mx,my-1,mc[(i+2)%mc.length]);
    if(i%3===0){px(c,mx-1,my,mc[(i+3)%mc.length]);px(c,mx,my+1,'rgba(45,106,79,0.3)')}
  }
}
// HD light dapples
function hdDapples(c,cx,cy,rx,ry,count,seed){
  for(let i=0;i<count;i++){
    const a=Math.sin(seed+i*5)*Math.PI;
    const r=Math.random()*.55;
    const dx=Math.round(cx+Math.cos(a)*rx*r);
    const dy=Math.round(cy+Math.sin(a)*ry*r);
    px(c,dx,dy,'rgba(200,255,210,0.1)');
    px(c,dx+1,dy,'rgba(180,240,190,0.07)');
    if(i%3===0) px(c,dx,dy-1,'rgba(220,255,220,0.06)');
  }
}

// ============ SPRITELIB TREE DRAWING PRIMITIVES ============
// High-detail tree sprite system from spriteLib_trees_complete
function sr(s){return()=>{s=(s*9301+49297)%233280;return s/233280}}
function dk(c,f){const[r,g,b]=pc2(c);return`rgb(${Math.max(0,r*f|0)},${Math.max(0,g*f|0)},${Math.max(0,b*f|0)})`}
function slLt(c,f){const[r,g,b]=pc2(c);return`rgb(${Math.min(255,r*f|0)},${Math.min(255,g*f|0)},${Math.min(255,b*f|0)})`}
function pc2(c){if(c[0]==='#')return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];const m=c.match(/(\d+)/g);return m?[+m[0],+m[1],+m[2]]:[0,0,0]}
// Filled ellipse
function fE(c,cx2,cy,rx2,ry,cl){for(let y=-ry;y<=ry;y++){const hw=Math.floor(rx2*Math.sqrt(Math.max(0,1-y*y/(ry*ry))));if(hw>=0)rc(c,cx2-hw,cy+y,hw*2+1,1,cl)}}
// Ground shadow
function gSh(c,cx2,y,rx2,ry){fE(c,cx2,y,rx2,ry,'rgba(8,20,12,0.18)');fE(c,cx2,y,rx2*.85|0,ry*.8|0,'rgba(8,20,12,0.10)')}
// Canopy blob with organic edges
function cB(c,cx2,cy,rx2,ry,p,o={}){
  const sd=o.seed||42,rng=sr(sd),wF=o.wF||3,wA=o.wA||.12,wA2=o.wA2||.06;
  const N=64,R=[];for(let i=0;i<N;i++){const a=i/N*Math.PI*2;R.push(1+Math.sin(a*wF+sd)*wA+Math.sin(a*(wF+2)+sd*2)*wA2)}
  for(let y=-ry-4;y<=ry+4;y++)for(let x=-rx2-4;x<=rx2+4;x++){
    const ag=Math.atan2(y,x),ai=((ag/(Math.PI*2))*N+N)%N,i0=ai|0,i1=(i0+1)%N,t=ai-i0;
    const lR=R[i0]*(1-t)+R[i1]*t,d=Math.sqrt(x*x/(rx2*rx2)+y*y/(ry*ry));
    if(d>lR)continue;
    const ld=Math.sqrt((x+rx2*.3)**2+(y+ry*.3)**2)/Math.sqrt(rx2*rx2+ry*ry);
    let cl;if(ld<.35)cl=p.h;else if(ld<.6)cl=p.l;else if(y>ry*.2)cl=p.s;else cl=p.b;
    if(d>lR-.12)cl=p.s;px(c,cx2+x,cy+y,cl);
  }
  if(o.ec!==false){const cnt=o.ec||28;for(let i=0;i<cnt;i++){
    const a=i/cnt*Math.PI*2,ai=((a/(Math.PI*2))*N+N)%N,i0=ai|0,i1=(i0+1)%N,t=ai-i0;
    const lR=R[i0]*(1-t)+R[i1]*t;
    const lx=Math.round(cx2+Math.cos(a)*rx2*lR),ly=Math.round(cy+Math.sin(a)*ry*lR);
    const cl=(a>Math.PI*.7&&a<Math.PI*1.9)?p.l:p.b;
    for(let j=0;j<2+(rng()*2|0);j++){px(c,lx+Math.round(Math.cos(a+j*.4)*(1+rng()*1.5)),ly+Math.round(Math.sin(a+j*.4)*(1+rng())),cl)}
  }}
}
function cBs(c,cx2,cy,rx2,ry,p,o={}){cB(c,cx2,cy,rx2,ry,{s:p.s,b:p.s,l:p.s,h:p.s},{...o,ec:false})}
// Conifer layers
function coniferLayers(c,CX,layers,pal,o={}){
  for(const L of layers){
    const tipY=L.y,baseY=L.y+L.h;
    for(let y=tipY+2;y<baseY+2;y++){const p=(y-tipY)/L.h,hw=L.w/2*p|0;rc(c,CX-hw+2,y,hw*2,1,pal.s)}
    for(let y=tipY;y<baseY;y++){const p=(y-tipY)/L.h,hw=L.w/2*p|0;
      for(let x=-hw;x<=hw;x++){const xn=(x+hw)/(hw*2||1);
        let cl;if(xn<.3)cl=pal.b;else if(xn<.55)cl=pal.l;else if(xn<.7)cl=pal.h;else cl=pal.b;
        if(p>.85)cl=pal.s;px(c,CX+x,y,cl);
      }
      if(y%4===0&&hw>4){px(c,CX-hw+1,y,pal.s);px(c,CX+hw-1,y,pal.s);
        if(y%8===0&&o.needles!==false){px(c,CX-hw-1,y,pal.b);px(c,CX+hw+1,y,pal.b)}}
    }
  }
}
// Trunk
function dT(c,cx2,yT,yB,bW,p,o={}){
  const fl=o.flare||0;
  for(let y=yT;y<yB;y++){const pr=(y-yT)/(yB-yT),f=pr*pr*fl|0,lx=cx2-(bW/2|0)-f,rx2=cx2+(bW/2|0)+f,w=rx2-lx;
    for(let x=lx;x<rx2;x++){const xn=(x-lx)/w;let cl;if(xn<.15)cl=p.s;else if(xn<.35)cl=p.b;else if(xn<.6)cl=p.l;else if(xn<.8)cl=p.b;else cl=p.s;px(c,x,y,cl)}
    if(o.furrows&&w>8){const sp=o.fSp||6;for(let fx=lx+3;fx<rx2-3;fx+=sp)px(c,fx,y,p.s)}
  }
}
// Multi-stem
function dMS(c,cx2,yB,stems,p){
  for(const s of stems){const sx=cx2+(s.ox||0),sy=s.sy||(yB-40);
    for(let y=sy;y<yB;y++){const w=s.w||5,lx=sx-(w/2|0);for(let x=lx;x<lx+w;x++){const xn=(x-lx)/w;px(c,x,y,xn<.25?p.s:xn<.65?p.l:p.b)}}
  }
}
// Detail functions
function bMarks(c,cx2,yT,yB,tW,sd){const r=sr(sd||42);for(let y=yT;y<yB;y++){const lx=cx2-(tW/2|0);if(y%7===0){const mw=4+(r()*5|0),mx=lx+2+(r()*(tW-mw-2)|0);rc(c,mx,y,mw,1,'rgba(80,65,50,0.55)')}if(y%11===3){const mw=3+(r()*3|0),mx=lx+2+(r()*(tW-mw-1)|0);rc(c,mx,y,mw,1,'rgba(90,75,60,0.4)')}}}
function pBark(c,cx2,yT,yB,tW,sd){const r=sr(sd||55),lx=cx2-(tW/2|0),rx3=cx2+(tW/2|0);[.3,.55,.75].forEach(p2=>{const py=yT+(yB-yT)*p2|0;if(r()>.4){px(c,lx-1,py,'#e8e0d0');px(c,lx-1,py+1,'#ddd4c4')}if(r()>.4){px(c,rx3,py+3,'#ddd4c4');px(c,rx3,py+4,'#d4c8b8')}})}
function dKnot(c,x,y,sz){const cs=['#5a4a38','#6b5a48','#7a6a58','#8a7a68'];for(let dy=-sz;dy<=sz;dy++)for(let dx=-sz;dx<=sz;dx++){const d=Math.sqrt(dx*dx+dy*dy);if(d<=sz)px(c,x+dx,y+dy,cs[Math.min(3,d|0)])}px(c,x,y,'#4a3a28')}
function dRoots(c,cx2,yB,tW,cl,cl2,sz){const lens={s:[5,3],m:[8,5,3],l:[12,8,5]}[sz||'m'];for(const s of[-1,1])for(let r=0;r<lens.length;r++){const rx2=cx2+s*((tW/2|0)+2+r*5),ry=yB-2-r*2,rL=lens[r],rH=Math.max(2,4-r),sx=s===1?rx2:rx2-rL;rc(c,sx,ry,rL,rH,cl);rc(c,sx+(s===1?0:1),ry,rL-1,1,cl2)}}
function dMoss(c,cx2,y,w,o={}){const h=o.h||3;rc(c,cx2-(w/2|0),y,w,h,o.c||'#2d6a4f');rc(c,cx2-(w/2|0)+1,y+1,w-2,1,o.cl||'#40916c')}

function dCatkins(c,pos,sd){const r=sr(sd||88),cs=['#c8b060','#b8a050','#a89040','#d0c070'];for(const[x,y]of pos){const len=3+(r()*3|0);for(let i=0;i<len;i++){const sw=Math.round(Math.sin(i*.8+sd)*.8);px(c,x+sw,y+i,cs[i%4]);if(i>0&&i<len-1)px(c,x+sw+1,y+i,cs[(i+1)%4])}}}
function dCones(c,pos){for(const[x,y]of pos){px(c,x,y,'#5a3828');px(c,x,y+1,'#4a2818');px(c,x+1,y,'#6a4838');px(c,x,y+2,'#3a1e10')}}

function dFlowers(c,pos,cl){for(const[x,y]of pos){px(c,x,y,cl);px(c,x+1,y,cl)}}

  mkHD('gd_cr',64,64,(c)=>{
    for(let y=0;y<64;y++)for(let x=0;x<64;x++){
      const n=Math.sin(x*.5+y*.7+333)*43758.5;
      const v=(n-Math.floor(n));
      const r=Math.floor(38+v*15),g=Math.floor(18+v*10),b=Math.floor(32+v*20);
      px(c,x,y,`rgb(${r},${g},${b})`);
    }
    // Purple vein network
    for(let i=0;i<8;i++){
      let vx=Math.floor(Math.random()*64),vy=Math.floor(Math.random()*64);
      for(let j=0;j<10;j++){
        px(c,vx,vy,'rgba(80,30,120,0.4)');
        vx+=Math.floor(Math.random()*3)-1;vy+=Math.floor(Math.random()*3)-1;
        vx=Math.max(0,Math.min(63,vx));vy=Math.max(0,Math.min(63,vy));
      }
    }
    // Dead grass stubs
    for(let i=0;i<6;i++){
      const gx=8+i*9,gy=20+i*5%40;
      px(c,gx,gy,'#5a4030');px(c,gx,gy-1,'#4a3020');px(c,gx,gy-2,'#3a2018');
    }
  });
  for(let v=0;v<6;v++){
    mkS('cp'+v,64,40,(c)=>{
      const cols=v<3?PAL.leaf1:PAL.leaf2;
      for(let i=0;i<10+v*2;i++){
        const cx2=8+Math.floor(Math.sin(v*5+i*3)*20)+20;
        const cy=6+Math.floor(Math.cos(v*7+i*5)*10)+10;
        const r=3+Math.floor(Math.sin(i*4+v*2)*3)+2;
        dithEllipse(c,cx2,cy,r,Math.floor(r*.6),cols,(v+i)*3);
      }
    });
  }

  // ===== WILDLIFE HD SPRITES =====
  // Deer (64×56 HD, 2 frames)
  for(let f=0;f<2;f++){
    mkHD('deer'+f,64,56,(c)=>{
      const CX=32;
      // Body — warm brown with zone shading
      const bY=26,bW=28,bH=16;
      for(let y=0;y<bH;y++)for(let x=0;x<bW;x++){
        const xn=x/bW,yn=y/bH;
        const ld=Math.sqrt((xn-.3)**2+(yn-.3)**2)*1.5;
        let cl;if(ld<.4)cl='#d0a068';else if(ld<.7)cl='#c08850';else cl='#a06838';
        if(yn>.85)cl='#8a5828';
        px(c,CX-bW/2+x|0,bY+y,cl);
      }
      // Legs — walking animation
      const legOff=f*3-1;
      rc(c,CX-10,bY+bH,4,10+legOff,'#8a6535');rc(c,CX-8,bY+bH,2,8+legOff,'#9a7545');
      rc(c,CX+6,bY+bH,4,10-legOff,'#8a6535');rc(c,CX+8,bY+bH,2,8-legOff,'#9a7545');
      // Hooves
      rc(c,CX-10,bY+bH+8+legOff,4,2,'#4a3020');
      rc(c,CX+6,bY+bH+8-legOff,4,2,'#4a3020');
      // Head (facing right)
      rc(c,CX+12,bY-4,10,12,'#c08850');rc(c,CX+14,bY-2,8,10,'#c89860');
      // Muzzle
      rc(c,CX+20,bY+2,4,6,'#b8a078');
      // Eye
      px(c,CX+18,bY,'#222');px(c,CX+19,bY-1,'#333');
      // Nose
      px(c,CX+23,bY+4,'#4a3020');
      // Antlers
      rc(c,CX+14,bY-10,2,6,'#a08060');rc(c,CX+12,bY-12,2,4,'#a08060');
      rc(c,CX+20,bY-10,2,6,'#a08060');rc(c,CX+22,bY-12,2,4,'#a08060');
      // Antler tips
      px(c,CX+11,bY-12,'#b09070');px(c,CX+23,bY-12,'#b09070');
      // Belly highlight
      rc(c,CX-8,bY+bH-3,16,2,'#d0b078');
      // White tail
      rc(c,CX-14,bY+2,4,6,'#f0e8d8');rc(c,CX-13,bY+3,2,4,'#fff');
      // Ear
      rc(c,CX+16,bY-6,4,4,'#b88848');px(c,CX+17,bY-5,'#daa080');
    });
  }

  // Rabbit (40×36 HD, 2 frames)
  for(let f=0;f<2;f++){
    mkHD('rab'+f,40,36,(c)=>{
      const CX=20;
      // Body — round, soft
      fE(c,CX,20,12,8,'#b0a080');
      fE(c,CX,19,10,7,'#cbb898');
      fE(c,CX-1,18,6,5,'#d8c8a8');
      // Ears
      rc(c,CX-6,4,4,12,'#d0c0a0');rc(c,CX-5,6,2,8,'#e8a0a0');
      rc(c,CX+2,4,4,12,'#d0c0a0');rc(c,CX+3,6,2,8,'#e8a0a0');
      // Ear tips
      px(c,CX-5,4,'#c0b090');px(c,CX+3,4,'#c0b090');
      // Legs
      const hop=f*4;
      rc(c,CX-8,24+hop,4,6,'#b0a080');rc(c,CX-7,24+hop,2,5,'#c0b090');
      rc(c,CX+4,24+4-hop,4,6,'#b0a080');rc(c,CX+5,24+4-hop,2,5,'#c0b090');
      // Paws
      rc(c,CX-8,29+hop,4,2,'#d0c0a0');rc(c,CX+4,29+4-hop,4,2,'#d0c0a0');
      // Eye
      px(c,CX+4,16,'#333');px(c,CX+5,15,'#444');
      // Nose
      px(c,CX+8,18,'#e8a0a0');
      // Cotton tail
      rc(c,CX-10,18,4,4,'#fff');rc(c,CX-9,19,2,2,'#f0f0f0');
      // Whiskers
      px(c,CX+10,17,'rgba(100,80,60,0.3)');px(c,CX+10,19,'rgba(100,80,60,0.3)');
    });
  }

  // Birds (36×28 HD, 3 palettes × 2 frames)
  const bPals=[
    {body:'#4a7a9a',wing:'#3a6a8a',breast:'#6a9ab0'},
    {body:'#8a5a3a',wing:'#7a4a2a',breast:'#aa7a5a'},
    {body:'#3a6a4a',wing:'#2a5a3a',breast:'#5a8a6a'},
  ];
  for(let b=0;b<3;b++){
    for(let f=0;f<2;f++){
      mkHD(`bird${b}_${f}`,36,28,(c)=>{
        const CX=18,BY=14,p=bPals[b];
        // Body
        fE(c,CX,BY,8,5,p.body);
        fE(c,CX-1,BY-1,6,4,p.breast);
        // Eye
        px(c,CX+5,BY-2,'#111');px(c,CX+6,BY-3,'#222');
        // Beak
        rc(c,CX+8,BY-1,4,2,'#e8a030');px(c,CX+11,BY-1,'#d08020');
        // Tail
        rc(c,CX-8,BY-1,4,3,p.wing);rc(c,CX-10,BY,3,2,p.wing);
        // Wings
        if(f===0){
          fE(c,CX-2,BY+1,6,3,p.wing);
        }else{
          rc(c,CX-6,BY-6,5,4,p.wing);px(c,CX-7,BY-7,p.wing);
          rc(c,CX+3,BY-5,5,3,p.wing);px(c,CX+7,BY-6,p.wing);
        }
        // Feet (resting only)
        if(f===0){
          px(c,CX-2,BY+5,'#888');px(c,CX-3,BY+6,'#888');px(c,CX-1,BY+6,'#888');
          px(c,CX+2,BY+5,'#888');px(c,CX+1,BY+6,'#888');px(c,CX+3,BY+6,'#888');
        }
        // Breast spot
        px(c,CX+1,BY,'#fff');
      });
    }
  }
}

function getSacredLore(wx,wy){
  // Determine biome of this sacred tree
  const biome=wy<40?3:wy<100?2:wy<170?1:0;
  // Use position as seed to pick consistent lore
  const lorePool=SACRED_LORE.filter(l=>l.biome===biome);
  if(lorePool.length===0)return null;
  const idx=(wx*7+wy*13)%lorePool.length;
  return lorePool[idx];
}

  const ambient=[

    "Paraît que les ermites vivent au-delà de la forêt mixte. Des anciens chamanes, dit-on.",

  ];

  if(cuts>15) rumors.push("Depuis que tu coupes autant, les oiseaux ne chantent plus au nord...");
  if(cuts>30) rumors.push("Un bûcheron est revenu blanc comme un linge hier. Il parle de champignons noirs qui poussent sur les souches.");
  if(cuts>50) rumors.push("La forêt mixte... Des ombres bougent là où il ne devrait y avoir que des arbres.");
  if(cuts>80) rumors.push("Les plus vieux disent qu'il y a un Gardien dans la forêt ancienne. Personne n'en est jamais revenu pour confirmer.");
  if(cuts>120) rumors.push("Au-delà de la forêt ancienne, les arbres sont... différents. Plus grands que tout. Vivants d'une autre manière.");
  if(_corrSources.length>3) rumors.push("La corruption s'étend... Ylva ne dort plus. Elle murmure des prières toute la nuit.");
  if(_corrSources.length>8) rumors.push("⚠️ La terre noircit. C'est pas naturel. Même les loups fuient les zones corrompues.");
  if((P._debt||0)>50) rumors.push("L'Émissaire tient les comptes de tout le monde. T'es pas le premier à t'endetter, mais les autres...");
  if(P._sacredLore&&P._sacredLore.length>0) rumors.push("Tu as touché un arbre sacré ? Fais gaffe. Ceux qui les cherchent finissent par trouver plus que prévu.");
  if(P._sacredLore&&P._sacredLore.length>3) rumors.push("Mon grand-père disait qu'il existe un cœur dans la forêt. Un endroit où tout est connecté. Légende, sûrement...");
  // Mix ambient + contextual
  const all=[...ambient,...rumors];
  return all[Math.floor(Math.random()*all.length)];
}

    lines.push("...");

  }else if(P._sacredLore&&P._sacredLore.length>2){
    lines.push("Tu as trouvé les arbres sacrés ? Bien... Ton grand-père les cherchait aussi.");
    lines.push("Il disait qu'ils contenaient la mémoire de tout. Le Pacte, le Cycle, la Vérité.");
  }else{
    const pool=[
      "Ramène-moi de la sève d'érable un jour... Ça me rappelle quand je pouvais encore marcher.",
      "*tousse*... Le thé d'Ylva aide, mais il ne guérit pas la vieillesse.",
      "L'Entreprise a envoyé un homme poli. Trop poli. Méfie-toi des sourires calculés.",
      "La forêt pardonne, petit. Mais elle n'oublie jamais. Comme ta grand-mère, tiens.",
      "Avant de dormir, écoute le vent dans les arbres. Il raconte des histoires.",
    ];
    lines.push(pool[Math.floor(gt*17+talks)%pool.length]);
  }
  P._grandparentTalked=(talks||0)+1;
    if(P._guardianDefeated && !P._ending){
    lines.push("Le Gardien est tomb\u00e9. L'Arbre est sauf.");
    lines.push("Aldric voudra que tu le coupes quand m\u00eame. Mais c'est ton choix.");
    lines.push("Ton grand-p\u00e8re aurait prot\u00e9g\u00e9 cet arbre. Tu le sais, n'est-ce pas ?");
    lines.push("...");
    lines.push("Oui. Tu le sais.");

}

function drawPortrait(npcType, canvas){
  const c = canvas.getContext('2d');
  c.imageSmoothingEnabled = false;
  c.clearRect(0,0,80,80);
  
  if(npcType === TT.FORGE) drawBjorn(c);
  else if(npcType === TT.CHAM) drawYlva(c);
  else if(npcType === TT.TAV) drawGunnar(c);
  else if(npcType === TT.EMIS) drawAldric(c);
  else if(npcType === TT.HOME) drawGrandparent(c);
  else if(npcType === TT.CARTO) drawCartographe(c);
  else if(npcType === TT.ANTHRO) drawAnthro(c);
  else if(npcType === TT.HERM) drawHermit(c);
  else if(npcType === TT.LUTH) drawLuthier(c);
  else if(npcType === TT.HERM_E) drawEstellePortrait(c);
  else if(npcType === TT.HERM_J) drawJardinierPortrait(c);
  else if(npcType === TT.HERM_T) drawTristePortrait(c);
  else if(npcType === TT.ARCHITECT) drawArchitectPortrait(c);

  // Border glow
  const nd = NPC_DATA[npcType];
  if(nd){
    c.strokeStyle = nd.borderCol;
    c.lineWidth = 1;
    c.strokeRect(0,0,80,80);
  }
}

// ============ DIALOGUE SYSTEM ============
let dlgQueue=[], dlgTyping=false, dlgCharIdx=0, dlgFullText='', dlgTimer=0;
const NPC_VISITS = {};

function getDialogue(npcType){
  const nd=NPC_DATA[npcType];
  if(!nd) return [];
  const first = !NPC_VISITS[npcType];
  const corrLevel = _corrSources.length;
  const hasDebt = (P._debt||0) > 0;
  const bigDebt = (P._debt||0) > 100;
  const lines = [];
  
  if(npcType === TT.FORGE){
    // Broken axe rejection
    if(P._brokenAxeItem&&!P._forgeronRejected){
      P._forgeronRejected=true;
      lines.push("*examine la hache brisée*");
      lines.push("... Attends. C'est pas du métal, ça.");
      lines.push("Cette lame... on dirait du bois. Mais dur comme du titane.");
      lines.push("C'est du bois-titane. J'en ai entendu parler, mais jamais vu.");
      lines.push("J'y peux rien. Je travaille le métal, pas le bois.");
      lines.push("Cherche quelqu'un qui connaît les matériaux anciens. Un ermite, peut-être.");
      return lines;
    }
    if(first){
      lines.push("Ah te voilà. L'Émissaire t'a recruté aussi, hein ?");
      lines.push("Fais gaffe avec ces gens-là. Enfin... viens me voir si tu veux du bon acier.");
    }else if(corrLevel > 8){
      lines.push("La forêt gronde... Mes outils tremblent la nuit sur l'établi.");
      lines.push("Mon père disait : « La forêt pardonne, mais elle n'oublie pas. »");
    }else if(cuts > 30){
      lines.push("T'abats du bois à un sacré rythme. Fais gaffe quand même.");
    }else{
      const pool=[
        "Le métal chante quand il est bien trempé. Comme la forêt.",
        "T'as besoin de quelque chose, ou tu viens juste te chauffer ?",
        "Un bon outil, c'est un partenaire. Pas un esclave.",
        "J'ai vu des bûcherons plus costauds que toi perdre leurs doigts. Reste prudent.",
        "Le frêne fait les meilleurs manches. L'aulne, c'est pour les débutants.",
      ];
      lines.push(pool[Math.floor(gt*7)%pool.length]);
    }
  }else if(npcType === TT.CHAM){
    const loreCount=(P._sacredLore||[]).length;
    const loreTotal=SACRED_LORE?SACRED_LORE.length:5;
    const saplings=P._saplings||0;
    const rituals=P._ritualsPerformed||0;
    const hasLegAxe=P._hasLegendaryAxe;
    const brokenAxeFound=P._brokenAxeFound;
    const estelleMet=P._estelleMet;
    const purPct=P._purificationPct||0;
    if(first){
      lines.push("Tu vas couper pour eux, n'est-ce pas ? Je le vois dans tes yeux.");
      lines.push("Sois prudent. Chaque arbre coupé laisse un vide. Et les vides attirent des choses.");
      lines.push("Si tu veux mes remèdes, rapporte-moi des herbes et des champignons des clairières.");
      lines.push("Et... écoute la forêt. Elle a des choses à te montrer, si tu sais regarder.");
    }else if(corrLevel > 5 && rituals===0){
      lines.push("La corruption dévore tout ! Il faut agir, maintenant !");
      lines.push("Plante des jeunes pousses dans les zones corrompues. Ça ralentit la progression.");
      lines.push("Et les rituels de purification... J'ai de l'encens si tu as des champignons.");
      if(!estelleMet) lines.push("Il y a une ermite dans la forêt ancienne, Estelle. Elle pourrait t'aider à combattre les ombres.");
    }else if(corrLevel > 5 && rituals>0){
      lines.push("Tu as commencé les rituels. Bien. Mais il en faut plus.");
      lines.push("Chaque zone purifiée est une victoire. Continue.");
      if(loreCount<loreTotal) lines.push(`Les fragments de lore sacré... tu en as ${loreCount} sur ${loreTotal}. Cherche dans les profondeurs.`);
    }else if(corrLevel > 0 && saplings===0){
      lines.push("Des murmures dans le sol. Ça commence...");
      lines.push("Plante des pousses. Le Jardinier des Racines peut t'aider — cherche-le dans la forêt.");
      lines.push("Et rapporte-moi des herbes. Mes potions de soin seront vitales bientôt.");
    }else if(corrLevel > 0){
      lines.push("La corruption est là, mais tu te bats. Je le vois.");
      if(saplings>0&&saplings<5) lines.push(`${saplings} pousses plantées. C'est un début. Continue.`);
      else if(saplings>=5) lines.push(`${saplings} pousses ! La forêt te remercie. Les racines chantent.`);
      if(loreCount>0&&loreCount<loreTotal) lines.push(`Les fragments de lore... ${loreCount}/${loreTotal}. Chaque fragment est une clé vers la compréhension.`);
    }else if(P._finalContractState==='offered'||P._finalContractState==='accepted'){
      lines.push("Aldric t'a parlé de l'Arbre Primordial, n'est-ce pas ?");
      lines.push("Ne le coupe pas. Je t'en supplie. L'Arbre est le cœur du Pacte.");
      lines.push("Il y a un autre chemin. Dépose ta hache à ses pieds. Renonce au cycle de destruction.");
      if(!hasLegAxe&&brokenAxeFound) lines.push("Et cette hache brisée que tu as trouvée... Björn pourrait la restaurer. Elle a un rôle à jouer.");
    }else if(hasLegAxe&&loreCount>=loreTotal){
      lines.push("Tu as la Hache Légendaire. Tu connais tout le lore sacré.");
      lines.push("Tu as le pouvoir de tout détruire... ou de tout restaurer.");
      lines.push("L'Arbre Primordial attend. Approche avec respect. Dépose la hache.");
      lines.push("C'est le seul chemin vers le renouveau.");
    }else if(hasLegAxe){
      lines.push("La Hache Légendaire... Elle vibre dans tes mains, non ?");
      lines.push("Un tel pouvoir peut guérir ou anéantir. Le choix sera le tien.");
      if(loreCount<loreTotal) lines.push(`Mais d'abord, cherche les fragments de lore. ${loreCount}/${loreTotal}. La vérité doit être comprise.`);
    }else if(brokenAxeFound&&!hasLegAxe){
      lines.push("Cette hache brisée que tu portes... Elle était à l'ancien héros.");
      lines.push("Björn le forgeron pourrait la restaurer. Mais l'ancienne sagesse dit qu'il faut du bois-titane.");
    }else if(purPct>50){
      lines.push("La forêt guérit ! Tu as purifié plus de la moitié de la corruption.");
      lines.push("Continue. Les ermites de la forêt t'observent avec espoir.");
      if(!estelleMet) lines.push("Cherche Estelle dans la forêt ancienne. Son combat t'apprendra la maîtrise.");
    }else if(P.herbs < TUNING.herbsForPotions && P.mushrooms < TUNING.mushsForEncens){
      lines.push(`Il me faut des herbes médicinales et des champignons pour préparer mes remèdes.`);
      lines.push(`Herbes: ${P.herbs}/${TUNING.herbsForPotions} · Champignons: ${P.mushrooms}/${TUNING.mushsForEncens}`);
      lines.push("Cherche dans les clairières, entre les arbres. Coupe-toi un chemin.");
    }else if(P.herbs >= TUNING.herbsForPotions && P.mushrooms < TUNING.mushsForEncens){
      lines.push("Bien, les herbes sont suffisantes pour les potions. Je peux t'en préparer.");
      lines.push(`Mais il me faut encore des champignons. ${P.mushrooms}/${TUNING.mushsForEncens}.`);
    }else if(P.herbs < TUNING.herbsForPotions && P.mushrooms >= TUNING.mushsForEncens){
      lines.push("Les champignons feront un bon encens. Mais les herbes manquent encore.");
      lines.push(`Herbes: ${P.herbs}/${TUNING.herbsForPotions}. Fouille les clairières.`);
    }else{
      const pool=[
        "Respire. L'air ici a le goût de la mousse et du temps.",
        "La sève est le sang de la forêt. Recueille-la avec respect.",
        "Les esprits observent. Ils ne jugent pas encore.",
        "Chaque racine est connectée. Coupe ici, quelque chose tremble là-bas.",
        "Tu as ramené de belles récoltes. Mes remèdes n'en seront que meilleurs.",
        "Les ermites de la forêt profonde gardent des secrets anciens. Cherche-les.",
        "Planter un arbre, c'est signer un pacte avec l'avenir.",
      ];
      lines.push(pool[Math.floor(gt*13)%pool.length]);
    }
    // Grandmother health guidance from Ylva
    if(P._doctorArrived && P._gmAlive && P._gmHealth<50){
      lines.push("...");
      lines.push("Ta grand-mère faiblit. Le docteur vend des remèdes... mais ils coûtent cher.");
      if(loreCount>=4&&P.sap>=5) lines.push("J'ai une alternative. La sève sacrée. Gratuite, mais il faut la mériter.");
      else if(loreCount<4) lines.push("Si tu trouves assez de lore sacré, je pourrai préparer un remède à base de sève sacrée.");
    }
  }else if(npcType === TT.TAV){
    if(first){
      lines.push("Salut ! T'as vu l'Émissaire s'installer ce matin ? Ils vont vite, ces gens du sud.");
      lines.push("Allez, pose-toi. Avec tout ce remue-ménage, on a tous besoin d'un bon repas.");
    }else if(bigDebt){
      lines.push("L'Émissaire te tient, hein ? J'ai vu d'autres finir comme ça...");
      lines.push("Un conseil : rembourse vite. Ces gens-là n'oublient jamais une dette.");
    }else if(corrLevel > 3){
      lines.push("Les chasseurs refusent d'aller au nord. Ils parlent d'ombres...");
    }else{
      const pool=[
        "Un ragoût de cerf et une bière de bouleau, ça te dit ?",
        "Les ermites du nord ? Pas vus depuis des semaines. Bizarre.",
        "Le Forgeron ronchonne, mais il a le meilleur acier du canton.",
        "Ylva a encore parlé aux arbres ce matin. Chacun son truc.",
        "L'Entreprise du sud... Ils sont polis, mais quelque chose cloche.",
        "Avant l'Entreprise, on vivait tranquilles. C'est peut-être le progrès.",
      ];
      lines.push(pool[Math.floor(gt*11)%pool.length]);
    }
  }else if(npcType === TT.EMIS){
    if(first){
      lines.push("Bonjour ! Je suis Aldric, envoyé par l'Entreprise. Ravi de travailler avec votre village.");
      lines.push("On a besoin de bois, vous avez besoin d'or. Simple, efficace, tout le monde y gagne.");
      lines.push("Apportez-moi du bois et je vous paierai au juste prix. Des contrats aussi, pour les ambitieux.");
    }else if(bigDebt){
      lines.push("Ta dette s'accumule, mon ami. Mais ne t'inquiète pas...");
      lines.push("L'Entreprise est patiente. Du moment que le bois rentre.");
    }else if(hasDebt){
      lines.push("N'oublie pas notre arrangement. Rien de personnel, c'est le commerce.");
    }else if(P._contract){
      const ct=P._contract;
      const held=P.woodByType[ct.type]||0;
      const timeLeft=Math.max(0,ct.deadline-gt);
      if(held===0 && timeLeft>0){
        // Guidance: player returned empty-handed
        if(ct.isTutorial){
          lines.push("C'est simple : sors du village vers le nord, trouve un Noisetier, et coupe-le avec ESPACE.");
          lines.push(`Tu en trouveras vers ${ct.zone}. Rapporte-moi le bois et je te paierai.`);
        }else{
          lines.push(`J'attends toujours ton ${ct.name}... Tu en trouveras vers ${ct.zone}.`);
          lines.push("Dépêche-toi, le temps passe !");
        }
      }else if(timeLeft<=0){
        lines.push("Le contrat est en retard... On peut encore s'arranger, mais le prix baisse.");
      }else if(timeLeft<60){
        lines.push("Le temps presse ! Rapporte-moi ce bois, vite !");
      }else{
        lines.push("Le contrat est en cours. Ramène-moi ce bois et tu seras bien payé.");
      }
    }else if(P._finalContractState==='refused'){
      lines.push("Vous avez refusé le contrat final. L'Entreprise n'oublie pas.");
      lines.push("Mais vous... vous avez fait votre choix. Vivez avec.");
    }else if(P._bossContractEast==='refused'||P._bossContractWest==='refused'){
      lines.push("Vous refusez mes contrats spéciaux... Vous pensez que ça n'a pas de conséquences ?");
      lines.push("L'Entreprise enverra quelqu'un d'autre. Quelqu'un de moins... délicat.");
    }else if(P._bossContractEast==='accepted'&&(!bossEast||!bossEast.defeated)){
      lines.push("L'Arbre-Pieuvre vous attend à l'est. N'oubliez pas notre accord.");
    }else if(P._bossContractWest==='accepted'&&(!bossWest||!bossWest.defeated)){
      lines.push("L'Ours Ancestral rôde toujours à l'ouest. Occupez-vous en.");
    }else{
      const pool=[
        "Du nouveau bois à vendre ? Je suis toujours acheteur.",
        "L'Entreprise paye bien. Mieux que n'importe qui d'autre ici.",
        "Un contrat, c'est gagnant-gagnant. Enfin, surtout gagnant pour toi.",
        "Tu sais, la forêt repousse. Elle repoussera toujours... non ?",
        "Certains me trouvent froid. Je suis juste... professionnel.",
      ];
      lines.push(pool[Math.floor(gt*17)%pool.length]);
    }
  }else if(npcType === TT.DOCTOR){
    const gmH=Math.floor(P._gmHealth||100);
    if(first){
      lines.push("Bonjour. Dr. Engström. L'Entreprise m'a envoyé.");
      lines.push("Votre grand-mère... Sa condition est stable, mais elle a besoin de soins réguliers.");
      lines.push("Les médicaments ne sont pas gratuits. Mais c'est ça ou...");
      lines.push("Enfin. Venez me voir souvent.");
    }else if(!P._gmAlive){
      lines.push("Je suis désolé. Sincèrement. J'ai fait ce que j'ai pu.");
      lines.push("...");
    }else if(gmH<25){
      lines.push("C'est critique. Si vous ne la soignez pas maintenant, je ne réponds de rien.");
      lines.push("Achetez des médicaments. Immédiatement.");
    }else if(gmH<50){
      lines.push("Sa santé décline. Elle a besoin de médicaments.");
      lines.push("Ne la laissez pas souffrir.");
    }else{
      lines.push("Votre grand-mère va bien pour le moment. Continuez les soins réguliers.");
    }
  }else if(npcType === TT.ARCHITECT){
    if(first){
      lines.push("Salut ! Sven, architecte et ingénieur. Les rivières m'ont attiré ici.");
      lines.push("Tu veux traverser les cours d'eau ? Construire des ponts ? Des radeaux ?");
      lines.push("J'ai les plans pour tout ça. Et aussi des barricades pour protéger le village.");
      lines.push("Rapporte-moi du bois, et je t'apprendrai à construire.");
    }else if((P._vilUnrest||0)>30&&(P._barricadesBuilt||0)<5){
      lines.push("Le village est menacé ! Les monstres rôdent au nord...");
      lines.push("Installe des barricades, vite ! J'ai les plans si tu veux.");
    }else if(P._hasRaftPlan&&P._hasBridgePlan&&P._hasBarricadePlan){
      lines.push("Tu as tous mes plans ! Tu es un vrai bâtisseur maintenant.");
      lines.push("Continue à construire des ponts et des barricades. C'est vital.");
    }else{
      const pool=[
        "Un bon pont vaut mieux qu'un long détour.",
        "Les radeaux, c'est rapide mais ça coûte du bois à chaque trajet.",
        "Les barricades protègent le village. Plus il y en a, mieux c'est.",
        "L'architecture, c'est l'art de résoudre les problèmes avec du bois.",
      ];
      lines.push(pool[Math.floor(gt*11)%pool.length]);
    }
  }else if(npcType === TT.HOME){
    // Grandparent dialogue

let dlgCallback = null;
function startDialogue(npcType, onDone){
  const nd = NPC_DATA[npcType];
  if(!nd || nd.noDialogue){onDone();return;}
  const lines = getDialogue(npcType);
  if(lines.length === 0){onDone();return;}
  dlgQueue = [...lines];
  dlgCallback = onDone;
  document.getElementById('dlg').style.display='block';
  document.getElementById('si2').style.display='none';
  document.querySelector('#shp h2').style.display='none';
  
  // Draw portrait
  const canvas = document.getElementById('dlg-portrait');
  drawPortrait(npcType, canvas);
  
  // Set name
  document.getElementById('dlg-name').textContent = nd ? `${nd.name}` : '';
  document.getElementById('dlg-name').style.color = nd ? nd.borderCol : '#52b788';
  
  // Start typing first line
  typeNextLine();
}

function typeNextLine(){
  if(dlgQueue.length === 0){
    // Done with dialogue
    document.getElementById('dlg').style.display='none';
    document.getElementById('si2').style.display='';
    document.querySelector('#shp h2').style.display='';
    if(dlgCallback) dlgCallback();
    return;
  }
  dlgFullText = dlgQueue.shift();
  dlgCharIdx = 0;
  dlgTyping = true;
  document.getElementById('dlg-text').textContent = '';
  document.getElementById('dlg-next').textContent = '...';
}

function advanceDialogue(){
  if(dlgTyping){
    // Skip typing, show full text
    dlgTyping = false;
    document.getElementById('dlg-text').textContent = dlgFullText;
    document.getElementById('dlg-next').textContent = dlgQueue.length > 0 ? 'Suivant ▶' : 'Acheter / Vendre ▶';
  }else{
    typeNextLine();
  }
}

// Called in game loop
function updateDialogue(d){
  if(!dlgTyping) return;
  dlgTimer += d;
  if(dlgTimer > 0.025){ // typing speed
    dlgTimer = 0;
    dlgCharIdx++;
    if(dlgCharIdx >= dlgFullText.length){
      dlgTyping = false;
      document.getElementById('dlg-text').textContent = dlgFullText;
      document.getElementById('dlg-next').textContent = dlgQueue.length > 0 ? 'Suivant ▶' : 'Acheter / Vendre ▶';
    }else{
      document.getElementById('dlg-text').textContent = dlgFullText.substring(0, dlgCharIdx);
    }
  }
}

// ============ MAP GEN ============
function n2(x,y,s){let n=Math.sin(x*127.1+y*311.7+s*73.13)*43758.5453;return n-Math.floor(n)}
function sn(x,y,s,sc){const sx=x/sc,sy=y/sc,ix=Math.floor(sx),iy=Math.floor(sy),fx=sx-ix,fy=sy-iy;const a=n2(ix,iy,s),b=n2(ix+1,iy,s),c=n2(ix,iy+1,s),d=n2(ix+1,iy+1,s);const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy}

function genMap(){
  map=[];corr=[];corrT=[];regrowMap=[];const seed=Math.random()*1000;
  const VIL_Y=MH-12; // village starts here (expanded: 12 tiles deep)
  const CX=128; // center x
  // Biome boundaries (y coords)
  const B_PRIM=40, B_ANC=100, B_MIX=170; // Primordiale<40, Ancienne 40-100, Mixte 100-170, Lisière 170-208
  for(let y=0;y<MH;y++){
    map[y]=[];corr[y]=[];corrT[y]=[];regrowMap[y]=[];
    for(let x=0;x<MW;x++){
      corr[y][x]=0;corrT[y][x]=0;regrowMap[y][x]=null;

      // ========== VILLAGE ZONE ==========
      if(y>=VIL_Y){
        const vx=x-CX, vy=y-VIL_Y;
        map[y][x]=TT.G;
        const inVil=(vx*vx)/225+(vy*vy)/49<1;
        if(inVil) map[y][x]=TT.VL;
        if(Math.abs(vx)<=1 && vy>=0 && vy<=11) map[y][x]=TT.PA;
        if(Math.abs(vx)<=2 && vy>=2 && vy<=9) map[y][x]=TT.PA;
        if(vy>=4 && vy<=5 && Math.abs(vx)<=10 && inVil) map[y][x]=TT.PA;
        if(vx===-7 && vy===3) map[y][x]=TT.FORGE;
        if(vx===7 && vy===3) map[y][x]=TT.CHAM;
        if(vx===-5 && vy===7) map[y][x]=TT.TAV;
        if(vx===6 && vy===7) map[y][x]=TT.EMIS;
        if(vx===0 && vy===9) map[y][x]=TT.HOME;
        if(vx===0 && vy===4) map[y][x]=TT.WELL;
        if(vy===1 && (vx===-10||vx===-8||vx===8||vx===10) && inVil) map[y][x]=TT.FENCE;
        if(vy===9 && (vx===-8||vx===-6||vx===6||vx===8) && inVil) map[y][x]=TT.FENCE;
        if(vy===2 && (vx===-4||vx===4)) map[y][x]=TT.LAMP;
        if(vy===6 && (vx===-3||vx===3)) map[y][x]=TT.LAMP;
        if(vy===9 && (vx===-1||vx===1)) map[y][x]=TT.LAMP;
        if(vx===-9 && vy===4) map[y][x]=TT.CRATE;
        if(vx===-6 && vy===2) map[y][x]=TT.CRATE;
        if(vx===-8 && vy===8) map[y][x]=TT.CART;
        if(vx===8 && vy===8) map[y][x]=TT.CRATE;
        if(vx===9 && vy===6) map[y][x]=TT.CRATE;
        if(vx===3 && vy===0) map[y][x]=TT.SIGN;
        if(inVil && map[y][x]===TT.VL){
          if((vx===-11&&vy===5)||(vx===11&&vy===5)||(vx===-4&&vy===9)||(vx===5&&vy===9)||(vx===-9&&vy===6)||(vx===10&&vy===3))
            map[y][x]=TT.FL;
          if((vx===-12&&vy===4)||(vx===12&&vy===4)||(vx===-10&&vy===7)||(vx===10&&vy===7))
            map[y][x]=TT.BU;
        }
        if(!inVil && map[y][x]===TT.G && vy>=1 && vy<=10){
          const r=n2(x,y,seed+500);
          if(r>.7) map[y][x]=TT.BOU;
          else if(r>.6) map[y][x]=TT.NOI;
          else if(r>.55) map[y][x]=TT.BU;
        }
        continue;
      }

      // Path from village into forest
      const distToVil=VIL_Y-y;
      const pathW=distToVil<4?2:distToVil<8?1:1;
      if(x>=CX-pathW&&x<=CX+pathW&&y>=VIL_Y-10&&y<VIL_Y){map[y][x]=TT.PA;continue}

      // Water features (repositioned for larger map)
      // Water: central forest ponds + marécage swamp pools + boréal frozen lakes
      const isMarecage=x>170, isBoreal=x<86, isCentral=x>=86&&x<=170;
      if(isCentral){
        if(Math.sqrt((x-110)**2+(y-150)**2)<3.5||Math.sqrt((x-155)**2+(y-135)**2)<3||
           Math.sqrt((x-CX)**2+(y-110)**2)<2.5||
           Math.sqrt((x-100)**2+(y-70)**2)<4||Math.sqrt((x-150)**2+(y-50)**2)<3.5||
           Math.sqrt((x-CX)**2+(y-20)**2)<3){map[y][x]=TT.WA;continue}
      }
      if(isMarecage){
        // Swamp water - lots of pools
        const sw=sn(x,y,seed+200,3);
        if(sw>.7||(sw>.55&&y%7<2)){map[y][x]=TT.WA;continue}
      }
      if(isBoreal){
        // Frozen lakes - larger, fewer
        if(Math.sqrt((x-40)**2+(y-100)**2)<8||Math.sqrt((x-25)**2+(y-50)**2)<6||
           Math.sqrt((x-55)**2+(y-160)**2)<5){map[y][x]=TT.WA;continue}
      }

      // Determine biome: lateral (x) + depth (y)
      const depth=1-(y/MH);
      const n1=sn(x,y,seed,5),n2v=sn(x,y,seed+50,2.5);const val=n1*.45+n2v*.55;
      const B_WEST=86, B_EAST=170; // lateral biome boundaries

      if(x<B_WEST){ // === BORÉAL (west) ===
        const dens=.55+depth*.2;
        if(val<dens*.55){
          const r=n2(x,y,seed+300);
          if(r<.03) map[y][x]=TT.EPI; // Épicéa de résonance (rare!)
          else if(r<.30) map[y][x]=TT.MEL;
          else if(r<.55) map[y][x]=TT.SAP_B;
          else if(r<.80) map[y][x]=TT.BPB;
          else map[y][x]=TT.PIN;
        }else if(val<dens*.65){
          map[y][x]=n2(x,y,seed+400)>.5?TT.MEL:TT.SAP_B;
        }else if(val<dens*.72) map[y][x]=TT.BU;
        else if(n2(x,y,seed+100)>.94) map[y][x]=TT.RK;
        else map[y][x]=TT.G;
      }else if(x>B_EAST){ // === MARÉCAGE (east) ===
        const dens=.50+depth*.25;
        if(val<dens*.50){
          const r=n2(x,y,seed+300);
          if(r<.02) map[y][x]=TT.EBE; // Ébène (très rare!)
          else if(r<.04) map[y][x]=TT.PAL; // Palissandre (rare)
          else if(r<.06) map[y][x]=TT.BDR; // Bois de Rose (rare)
          else if(r<.40) map[y][x]=TT.CYP;
          else map[y][x]=TT.MAN;
        }else if(val<dens*.60){
          map[y][x]=n2(x,y,seed+400)>.5?TT.CYP:TT.MAN;
        }else if(val<dens*.68) map[y][x]=TT.BU;
        else if(n2(x,y,seed+100)>.93) map[y][x]=TT.FL;
        else map[y][x]=TT.G;
      }else{ // === CENTRAL FOREST ===
        const biome=y<B_PRIM?3:y<B_ANC?2:y<B_MIX?1:0;
        const dens=.48+depth*.35+(biome>=2?.08:0);
        if(biome===0){ // Lisière
          if(val<dens*.5){
            const r=n2(x,y,seed+300);
            if(r<.25) map[y][x]=TT.NOI;
            else if(r<.45) map[y][x]=TT.AUL;
            else if(r<.80) map[y][x]=TT.BOU;
            else map[y][x]=TT.ERA;
          }else if(val<dens*.62) map[y][x]=TT.BOU;
          else if(val<dens*.68) map[y][x]=TT.BU;
          else if(n2(x,y,seed+100)>.90) map[y][x]=TT.FL;
          else if(n2(x,y,seed+150)>.975) map[y][x]=TT.RK;
          else map[y][x]=TT.G;
        }else if(biome===1){ // Forêt Mixte
          if(val<dens*.45){
            const r=n2(x,y,seed+300);

function isT(t){return !!ESS[t]}
function isBld(t){return t===TT.FORGE||t===TT.CHAM||t===TT.TAV||t===TT.EMIS||t===TT.HOME||t===TT.SH||t===TT.CARTO||t===TT.ANTHRO||t===TT.HERM||t===TT.LUTH||t===TT.HERM_E||t===TT.HERM_J||t===TT.HERM_T||t===TT.BROKEN_AXE||t===TT.CABIN_ABAND||t===TT.DOCTOR||t===TT.ARCHITECT}
function isDeco(t){return t===TT.WELL||t===TT.FENCE||t===TT.CRATE||t===TT.LAMP||t===TT.CART}
function isS(t){return isT(t)||t===TT.WA||t===TT.RK||t===TT.BARR||isBld(t)||isDeco(t)||t===TT.SEED_TILE||t===TT.RIVER||t===TT.VIL_BARRICADE}

// Flood-fill to find contiguous stump cluster (8-connected)
function findStumpCluster(sx,sy){
  const visited=new Set(),stack=[[sx,sy]],cluster=[];
  while(stack.length){
    const[x,y]=stack.pop(),k=x+','+y;
    if(visited.has(k)||x<0||y<0||x>=MW||y>=MH)continue;
    if(map[y][x]!==TT.ST)continue;
    visited.add(k);cluster.push([x,y]);
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      if(dx===0&&dy===0)continue;
      stack.push([x+dx,y+dy]);
    }
  }
  return cluster;
}
// After cutting: check if this stump creates a dangerous cluster
// Now uses density check: rewards spaced cutting patterns
function checkCorrTrigger(tx,ty){
  const cluster=findStumpCluster(tx,ty);
  // Check 1: cluster size must exceed threshold
  if(cluster.length>=TUNING.corrMinCluster){
    // Check 2: density in local area - if stumps are well-spaced, don't corrupt
    const r=TUNING.corrDensityRadius;
    let stumps=0,total=0;
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const nx=tx+dx,ny=ty+dy;
      if(nx<0||ny<0||nx>=MW||ny>=MH)continue;
      if(Math.sqrt(dx*dx+dy*dy)>r)continue;
      total++;
      if(map[ny][nx]===TT.ST)stumps++;
    }
    const density=stumps/Math.max(1,total);
    if(density>=TUNING.corrDensityThreshold){
      cluster.forEach(([x,y])=>{
        if(!corrSrc[y][x]){
          corrSrc[y][x]=true;
          _corrSources.push([x,y]);
          if(!corrT[y][x])corrT[y][x]=gt;
        }
      });
      shake=.4;
      ft2(tx+.5,ty-1,'⚠️ Corruption!','#b266ff');sfxCorruption();
    }
  }
}

// ============ SACRED MINI-BOSS UPDATE ============
function updSacredMiniBosses(d){
  for(let i=sacredMiniBosses.length-1;i>=0;i--){
    const b=sacredMiniBosses[i];
    if(b.defeated){sacredMiniBosses.splice(i,1);continue}
    b.ht=Math.max(0,b.ht-d);
    b.roar=Math.max(0,b.roar-d);
    if(b.roar>0)continue;
    const dx=P.x-b.x,dy=P.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
    // Chase player
    if(dist<12&&dist>1){b.x+=(dx/dist)*b.spd*d;b.y+=(dy/dist)*b.spd*d}
    // Attack
    b.at-=d;
    if(dist<1.5&&P.iv<=0&&b.at<=0){
      b.at=1.2;
      hurtP(b.dmg,1,.3,.6,'#daa520',8,b);
    }
  }
}
// Hit detection for sacred mini-bosses (called from combat section)
function hitSacredMiniBoss(px2,py2,pow){
  sacredMiniBosses.forEach(b=>{
    if(b.defeated)return;
    const dx=b.x-px2,dy=b.y-py2;
    if(Math.sqrt(dx*dx+dy*dy)<1.5){
      b.hp-=pow;b.ht=.2;shake=.2;
      sp(b.x,b.y,'#daa520',6);ft2(b.x,b.y-1,'-'+pow,'#daa520');
      if(b.hp<=0){
        b.defeated=true;
        ft2(b.x,b.y-2,b.name+' VAINCU !','#ffd700');
        sp(b.x,b.y,'#ffd700',20);shake=1;
        // Drop spiritual essences
        P.essences=(P.essences||0)+3;
        ft2(b.x,b.y-1,'✨+3 Essences spirituelles','#b266ff');
        P.g+=30;ft2(b.x,b.y,'💰+30','#ffd700');
      }
    }
  });
}

// ============ REGROWTH SYSTEM ============
let _rgT=0;
function updRegrow(d){

// Returns true if position (tx,ty) is within a sacred tree's aura
let _sacredAuraCache=null; // cached set of protected tiles, rebuilt when sacred trees change
let _sacredAuraDirty=true;
function rebuildSacredAura(){
  _sacredAuraCache=new Set();
  const r=TUNING.sacredAuraRadius;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const t=map[y][x];
    if(t===TT.TJ||t===TT.ARBRE_CHANT){
      for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
        const nx=x+dx,ny=y+dy;
        if(nx<0||ny<0||nx>=MW||ny>=MH)continue;
        if(Math.sqrt(dx*dx+dy*dy)<=r) _sacredAuraCache.add(ny*MW+nx);
      }
    }
  }
  _sacredAuraDirty=false;
}
function inSacredAura(tx,ty){
  if(_sacredAuraDirty||!_sacredAuraCache) rebuildSacredAura();
  return _sacredAuraCache.has(ty*MW+tx);
}

// Corruption only spreads from marked source tiles (contiguous clear-cuts)
let _corrSources=[]; // list of [x,y] source positions for fast iteration
let _corrT2=0;
function updCorr(d){
  _corrT2+=d;if(_corrT2<.5)return;_corrT2=0;
  const sr=TUNING.corrSpreadRadius;
  // Only iterate known sources
  _corrSources.forEach(([x,y])=>{
    // Skip tiles protected by sacred aura
    if(inSacredAura(x,y))return;
    for(let dy=-Math.ceil(sr);dy<=Math.ceil(sr);dy++)for(let dx=-Math.ceil(sr);dx<=Math.ceil(sr);dx++){
      const nx=x+dx,ny=y+dy;
      if(nx<0||ny<0||nx>=MW||ny>=MH)continue;
      // Skip tiles in sacred aura
      if(inSacredAura(nx,ny))continue;
      const di=Math.sqrt(dx*dx+dy*dy);
      if(di>sr)continue;
      if(corr[ny][nx]<1){
        if(!corrT[ny][nx])corrT[ny][nx]=gt;
        corr[ny][nx]=Math.min(1,corr[ny][nx]+TUNING.corrSpreadRate*(1-di/sr));
      }
    }
  });
  // Passive growth in player vicinity only
  const px2=Math.floor(P.x),py2=Math.floor(P.y);
  for(let y=Math.max(0,py2-20);y<Math.min(MH,py2+20);y++)
    for(let x=Math.max(0,px2-20);x<Math.min(MW,px2+20);x++){
      if(corr[y][x]>0&&corr[y][x]<1)
        corr[y][x]=Math.min(1,corr[y][x]+(gt-corrT[y][x])*TUNING.corrPassiveGrowth);
    }
  // Debt interest
  if(P._debt>0&&TUNING.debtInterestRate>0){
    P._debt=Math.floor(P._debt*(1+TUNING.debtInterestRate*d/60));
  }
  // === GRANDMOTHER HEALTH TIMER ===
  if(P._gmAlive&&P._doctorArrived){
    P._gmHealth=Math.max(0,P._gmHealth-TUNING.gmHealthDecay*d);
    if(P._gmHealth<=0){
      P._gmAlive=false;P._gmHealth=0;
      ft2(P.x,P.y-2,'💀 Grand-mère est partie...','#8b0000');
      shake=1;
    }
  }
}

function updFigurants(d){

    const dx=f.tx-f.x,dy=f.ty-f.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<.5){

// ============ WILDLIFE SYSTEM ============
let _wlT=0;
function spawnWildlife(){
  _wlT++;if(_wlT%120!==0)return; // check every ~2 seconds
  const deer=wildlife.filter(w=>w.tp==='deer').length;
  const rabbit=wildlife.filter(w=>w.tp==='rabbit').length;
  const bird=wildlife.filter(w=>w.tp==='bird').length;
  // Spawn in uncorrupted areas away from player
  for(let attempt=0;attempt<3;attempt++){
    const sx=Math.floor(Math.random()*MW);
    const sy=Math.floor(Math.random()*(MH-15));
    if((corr[sy]?.[sx]||0)>.1)continue;
    const dx=sx-P.x,dy=sy-P.y,di=Math.sqrt(dx*dx+dy*dy);
    if(di<16)continue; // don't spawn too close
    const tile=map[sy]?.[sx];
    if(tile!==TT.G&&!isT(tile))continue;
    // Pick type based on biome
    if(sy<90&&deer<TUNING.wildlifeMaxDeer&&Math.random()<.4){
      wildlife.push({tp:'deer',x:sx+.5,y:sy+.5,vx:0,vy:0,f:Math.floor(Math.random()*4),wa:0,fleeing:false,fleeT:0,fleeX:sx,fleeY:sy,idle:Math.random()*5,grazing:false});
    }else if(rabbit<TUNING.wildlifeMaxRabbit&&Math.random()<.5){
      wildlife.push({tp:'rabbit',x:sx+.5,y:sy+.5,vx:0,vy:0,f:Math.floor(Math.random()*4),wa:0,fleeing:false,fleeT:0,fleeX:sx,fleeY:sy,idle:Math.random()*3,grazing:false});
    }else if(bird<TUNING.wildlifeMaxBird&&Math.random()<.6){
      wildlife.push({tp:'bird',x:sx+.5,y:sy+.5,vx:0,vy:0,f:0,wa:0,fleeing:false,fleeT:0,fleeX:sx,fleeY:sy,idle:Math.random()*4,flying:false,flyH:0,bc:Math.floor(Math.random()*3)});
    }
  }
}
function updWildlife(d){
  spawnWildlife();
  for(let i=wildlife.length-1;i>=0;i--){
    const w=wildlife[i];
    const dx=w.x-P.x,dy=w.y-P.y,di=Math.sqrt(dx*dx+dy*dy);
    // Despawn if too far
    if(di>40){wildlife.splice(i,1);continue}
    // Despawn if in corrupted area
    const wx=Math.floor(w.x),wy=Math.floor(w.y);
    if(wx>=0&&wy>=0&&wx<MW&&wy<MH&&(corr[wy]?.[wx]||0)>.3){wildlife.splice(i,1);continue}
    // Player proximity → flee
    if(di<TUNING.wildlifeFleeRadius&&!w.fleeing){
      w.fleeing=true;w.fleeT=2+Math.random()*2;
      w.fleeX=w.x+(dx>0?1:-1)*(6+Math.random()*4);
      w.fleeY=w.y+(dy>0?1:-1)*(6+Math.random()*4);
    }
    // Wolf proximity → flee (wolves scare wildlife)
    if(!w.fleeing){for(let wi=0;wi<wolves.length;wi++){const wl=wolves[wi];const wdx=w.x-wl.x,wdy=w.y-wl.y,wdi=Math.sqrt(wdx*wdx+wdy*wdy);if(wdi<8){w.fleeing=true;w.fleeT=3+Math.random()*2;w.fleeX=w.x+(wdx>0?1:-1)*(8+Math.random()*4);w.fleeY=w.y+(wdy>0?1:-1)*(8+Math.random()*4);break}}}
    if(w.fleeing){
      w.fleeT-=d;
      const fdx=w.fleeX-w.x,fdy=w.fleeY-w.y,fdi=Math.sqrt(fdx*fdx+fdy*fdy);
      const spd=w.tp==='deer'?6:w.tp==='rabbit'?5:4;
      if(fdi>.5){
        w.vx=fdx/fdi*spd;w.vy=fdy/fdi*spd;
        // Determine facing
        if(Math.abs(w.vx)>Math.abs(w.vy))w.f=w.vx>0?1:3;else w.f=w.vy>0?2:0;
      }
      if(w.fleeT<=0||fdi<.5){w.fleeing=false;w.vx=0;w.vy=0;w.idle=2+Math.random()*4}
      // Birds fly when fleeing
      if(w.tp==='bird'&&w.fleeing){w.flying=true;w.flyH=Math.min(3,w.flyH+d*4)}
    }else{
      // Idle behavior
      w.idle-=d;
      if(w.idle<=0){
        // Random wander
        const wa=Math.random()*Math.PI*2;
        const ws=.3+Math.random()*.3;
        w.vx=Math.cos(wa)*ws;w.vy=Math.sin(wa)*ws;
        if(Math.abs(w.vx)>Math.abs(w.vy))w.f=w.vx>0?1:3;else w.f=w.vy>0?2:0;
        w.idle=2+Math.random()*5;
        w.grazing=Math.random()>.5;
        if(Math.random()>.7){w.vx=0;w.vy=0;} // sometimes just stop
      }

// ============ WOLF PACK SYSTEM (nocturnal) ============
function spawnWolves(){
  const ds=getDayState(),nm=ds.nightMul||0;
  // Only spawn at night
  if(nm<TUNING.wolfNightThreshold)return;
  // Cooldown
  if(gt<_wolfSpawnT)return;
  // Count active packs
  const packIds=new Set(wolves.map(w=>w.packId));
  if(packIds.size>=TUNING.wolfMaxPacks)return;
  // Find a spawn point in forested area, 12-20 tiles from player
  for(let attempt=0;attempt<5;attempt++){
    const angle=Math.random()*Math.PI*2;
    const dist=12+Math.random()*8;
    const sx=Math.floor(P.x+Math.cos(angle)*dist);
    const sy=Math.floor(P.y+Math.sin(angle)*dist);
    if(sx<2||sy<2||sx>=MW-2||sy>=MH-15)continue;
    if((corr[sy]?.[sx]||0)>.5)continue; // avoid heavily corrupted zones
    const tile=map[sy]?.[sx];
    if(tile!==TT.G&&!isT(tile))continue;
    // Spawn pack
    const pid=Date.now()+Math.random();
    const packSize=TUNING.wolfPackSize[0]+Math.floor(Math.random()*(TUNING.wolfPackSize[1]-TUNING.wolfPackSize[0]+1));
    for(let i=0;i<packSize;i++){
      const ox=(Math.random()-.5)*3,oy=(Math.random()-.5)*3;
      wolves.push({
        x:sx+ox,y:sy+oy,
        hp:TUNING.wolfHp,mhp:TUNING.wolfHp,
        spd:TUNING.wolfSpeed+Math.random()*.2,
        dmg:TUNING.wolfDmg,
        ht:0,ar:TUNING.wolfAggroRadius,
        fr:Math.random()*4,wb:Math.random()*6,
        mt:Math.random()*1.5,
        packId:pid,packX:sx,packY:sy,
        howlT:0
      });
    }
    _wolfSpawnT=gt+TUNING.wolfSpawnCooldown;
    // Howl notification if nearby
    if(dist<18){
      ft2(P.x,P.y-1.5,'🐺 Hurlement dans la nuit...','#b0b0c0');sfxWolf();
    }
    break;
  }
}
function updWolves(d){
  const ds=getDayState(),nm=ds.nightMul||0;
  spawnWolves();
  for(let i=wolves.length-1;i>=0;i--){
    const w=wolves[i];
    w.ht=Math.max(0,w.ht-d);w.fr+=d*4;w.wb+=d*3;
    // Dawn: flee and despawn
    if(nm<TUNING.wolfDawnFleeThreshold){
      // Run away from player
      const dx=w.x-P.x,dy=w.y-P.y,di=Math.sqrt(dx*dx+dy*dy);
      if(di>0){w.x+=(dx/di)*w.spd*2*d;w.y+=(dy/di)*w.spd*2*d}
      if(di>30||w.x<1||w.y<1||w.x>=MW-1||w.y>=MH-1){wolves.splice(i,1)}
      continue;
    }
    const dx=P.x-w.x,dy=P.y-w.y,di=Math.sqrt(dx*dx+dy*dy);
    // Despawn if very far
    if(di>40){wolves.splice(i,1);continue}
    // Pack cohesion: find pack center
    const pack=wolves.filter(o=>o.packId===w.packId);
    let pcx=0,pcy=0;pack.forEach(p=>{pcx+=p.x;pcy+=p.y});
    pcx/=pack.length;pcy/=pack.length;
    // Movement
    w.mt-=d;
    if(di<w.ar&&w.mt<=0){
      // Chase player
      let mx=dx/di*w.spd*d,my=dy/di*w.spd*d;
      // Pack cohesion pull (gentle)
      const cdx=pcx-w.x,cdy=pcy-w.y,cdi=Math.sqrt(cdx*cdx+cdy*cdy);
      if(cdi>TUNING.wolfPackRadius){mx+=cdx/cdi*.3*d;my+=cdy/cdi*.3*d}
      const tx2=Math.floor(w.x+mx),ty2=Math.floor(w.y+my);
      if(tx2>=0&&ty2>=0&&tx2<MW&&ty2<MH&&!isS(map[ty2][tx2])){w.x+=mx;w.y+=my}
    }else if(w.mt<=0){
      // Wander near pack center
      w.mt=1+Math.random()*2;
      const wa=Math.random()*Math.PI*2;
      const tgt_x=pcx+Math.cos(wa)*TUNING.wolfPackRadius;
      const tgt_y=pcy+Math.sin(wa)*TUNING.wolfPackRadius;
      w.packX=tgt_x;w.packY=tgt_y;
    }else if(di>=w.ar){
      // Drift toward wander target
      const wdx=w.packX-w.x,wdy=w.packY-w.y,wdi=Math.sqrt(wdx*wdx+wdy*wdy);
      if(wdi>.5){
        const mx=wdx/wdi*w.spd*.4*d,my=wdy/wdi*w.spd*.4*d;
        const tx2=Math.floor(w.x+mx),ty2=Math.floor(w.y+my);
        if(tx2>=0&&ty2>=0&&tx2<MW&&ty2<MH&&!isS(map[ty2][tx2])){w.x+=mx;w.y+=my}
      }
    }
    // Damage player on contact
    if(di<.8&&P.iv<=0){
      hurtP(w.dmg,.8,.3,.4,'#8888aa',6,w);
    }
    // Death
    if(w.hp<=0){
      sp(w.x,w.y,'#6a6a72',10);
      if(Math.random()<.25&&invFree()>=RES_WEIGHT.sap){P.sap++;ft2(w.x,w.y,'💧+1','#b266ff')}
      wolves.splice(i,1);
    }
  }
}

      const cR=2.5,cPow=Math.ceil(P.pow*1.5);
      ents.forEach(e=>{const di=Math.sqrt((e.x-P.x)**2+(e.y-P.y)**2);if(di<cR){e.hp-=cPow;e.ht=.3;sp(e.x,e.y,'#ff4444',6);sfxHit()}});

      wolves.forEach(w=>{const wx2=w.x-(P.x+dd[0]*.5),wy2=w.y-(P.y+dd[1]*.5);if(Math.sqrt(wx2*wx2+wy2*wy2)<1.5){w.hp-=P.pow;w.ht=.2;shake=.15;sp(w.x,w.y,'#aaaacc',5)}});

    if(bossWest && !bossWest.defeated){const bwx=bossWest.x-(P.x+dd[0]),bwy=bossWest.y-(P.y+dd[1]);if(Math.sqrt(bwx*bwx+bwy*bwy)<2.5){bossWest.hp-=P.pow;bossWest.ht=.3;shake=.3;sp(bossWest.x,bossWest.y,'#ffaa40',8);ft2(bossWest.x,bossWest.y-1,'-'+P.pow,'#ffaa40');if(bossWest.hp<=0){bossWest.defeated=true;ft2(bossWest.x,bossWest.y-2,'OURS ANCESTRAL VAINCU !','#ffd700');sp(bossWest.x,bossWest.y,'#ffd700',25);shake=1.5;P.g+=100;addMaitrise(8)}}}
    // Guardian hit detection
    if(guardian && !guardian.defeated){const gx=guardian.x-(P.x+dd[0]),gy=guardian.y-(P.y+dd[1]);if(Math.sqrt(gx*gx+gy*gy)<2.5){guardian.hp-=P.pow;guardian.ht=.3;shake=.3;sp(guardian.x,guardian.y,'#ff6b6b',8);ft2(guardian.x,guardian.y-1,'-'+P.pow,'#ff6b6b');if(guardian.hp<=0){guardian.defeated=true;P._guardianDefeated=true;P._guardianFought=true;addMaitrise(10);ft2(guardian.x,guardian.y-2,'GARDIEN VAINCU !','#ffd700');sp(guardian.x,guardian.y,'#ffd700',25);shake=2}}}
    if(tx>=0&&ty>=0&&tx<MW&&ty<MH&&isT(map[ty][tx])){

      // === PRIMORDIAL TREE SPECIAL HANDLING ===
      if(tile===TT.PRIM){

            sp(tx+.5,ty+.5,'#8b0000',20);
            return;
          }else{

          }
