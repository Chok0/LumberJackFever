        return; // bounce — can't even damage it
      }
      // Axe durability — dull axe does half damage, doesn't block
      const isDull=P._axeDur<=0;
      if(!isDull) P._axeDur=Math.max(0,P._axeDur-1);
      if(isDull&&Math.random()<.15) ft2(P.x,P.y-.5,'🪓 Émoussée...','#e9c46a');
      if(P._axeDur<=Math.floor(P._axeMaxDur*0.2)&&P._axeDur>0&&P._axeDur%5===0){
        ft2(P.x,P.y-1,'⚠️ Hache fragile !','#e9c46a');
      }
      const need=ess.hp;
      const hk=tx+','+ty;if(!_th[hk])_th[hk]=0;_th[hk]+=isDull?Math.max(1,Math.floor(P.pow/2)):P.pow;
      sp(tx+.5,ty+.5,'#8B6914',4);shake=.07;
      // Show name on first hit
      if(_th[hk]===P.pow)ft2(tx+.5,ty-.5,ess.name,'#b7e4c7');
      if(_th[hk]>=need){
        const w=ess.wood;
        const canCarry=Math.floor(invFree()/RES_WEIGHT.wood);
        const toAdd=Math.min(w,canCarry);
        if(toAdd>0){P.w+=toAdd;P.wv=(P.wv||0)+toAdd*ess.gold;P.woodByType[tile]=(P.woodByType[tile]||0)+toAdd;}
        if(toAdd<w){
          const lost=w-toAdd;
          ft2(tx+.3,ty-.3,toAdd<=0?`🪵${w} perdu!`:`(${lost} perdu)`,'#e74c3c');
        }
        // === SACRED TREE CONSEQUENCES ===
        if(ess.sacred){
          // Cutting a sacred tree: corruption explosion + mini-boss
          const auraR=TUNING.sacredAuraRadius;
          for(let dy2=-auraR;dy2<=auraR;dy2++)for(let dx2=-auraR;dx2<=auraR;dx2++){
            const nx2=tx+dx2,ny2=ty+dy2;
            if(nx2<0||ny2<0||nx2>=MW||ny2>=MH)continue;
            if(Math.sqrt(dx2*dx2+dy2*dy2)<=auraR){
              corr[ny2][nx2]=Math.min(1,corr[ny2][nx2]+0.6*(1-Math.sqrt(dx2*dx2+dy2*dy2)/auraR));
              if(!corrT[ny2][nx2])corrT[ny2][nx2]=gt;
              if(!corrSrc[ny2][nx2]&&map[ny2][nx2]===TT.ST){corrSrc[ny2][nx2]=true;_corrSources.push([nx2,ny2])}
            }
          }
          // Spawn sacred guardian mini-boss
          const biome=ty<40?3:ty<100?2:ty<170?1:0;
          spawnSacredMiniBoss(tx,ty,biome);
          ft2(tx+.5,ty-2,'💀 CORRUPTION EXPLOSIVE !','#8b0000');
          shake=2;sp(tx+.5,ty+.5,'#b266ff',25);sfxCorruption();
          _sacredAuraDirty=true; // Rebuild aura cache
          // Track Arbre-Chant cutting
          if(tile===TT.ARBRE_CHANT){P._arbreChantCut=true;ft2(tx+.5,ty-3,'L\'Arbre-Chant tombe...','#daa520')}
          // Trigger rare wood arrival check for luthier
          if(!P._luthierArrived)checkLuthierArrival(tile);
        }
        if(ess.regrow>0)regrowMap[ty][tx]={ess:tile,time:gt+ess.regrow};
        // Player-planted trees regrow automatically in 1 cycle
        if(regrowMap[ty]?._planted){
          regrowMap[ty][tx]={ess:tile,time:gt+300}; // ~1 day/night cycle (300s)
        }
        map[ty][tx]=TT.ST;delete _th[hk];cuts++;sfxTreeFall();
        // Scoring: Destruction +1 per tree, +5 for sacred
        addDestruction(ess.sacred?5:1);
        // Check luthier arrival on rare wood
        if(!P._luthierArrived)checkLuthierArrival(tile);
        // Track first corruption trigger
        checkCorrTrigger(tx,ty);
        sp(tx+.5,ty+.5,'#52b788',10);sp(tx+.5,ty+.3,'#c9a86c',8);shake=.3;
        const goldVal=toAdd*ess.gold;
        if(toAdd>0)ft2(tx+.5,ty,`🪵+${toAdd} (${goldVal}💰)`,'#deb887');
        else ft2(tx+.5,ty,'🪵 Sac plein — bois perdu','#e74c3c');
        for(let i=0;i<8;i++)amb.push({x:tx+.5,y:ty,vx:wind.x+(Math.random()-.5)*2.5,vy:-Math.random()*2.5-1,l:1.5+Math.random(),ml:2,c:PAL.leaf1[i%PAL.leaf1.length],s:1.5+Math.random(),rot:Math.random()*6});
        ents.forEach(e=>{if(Math.sqrt((e.x-tx)**2+(e.y-ty)**2)<12)e.mt=0});
      }
    }
  }
  // Track deepest biome reached
  const prevBiome=P._deepestBiome;
  if(P.y<40&&P._deepestBiome<3){P._deepestBiome=3;ft2(P.x,P.y-1,'🌲 Forêt Primordiale','#b266ff')}
  else if(P.y<100&&P._deepestBiome<2){P._deepestBiome=2;ft2(P.x,P.y-1,'🌲 Forêt Ancienne','#1a4a28')}

  if(P.x>170&&!P._enteredMarecage){P._enteredMarecage=true;ft2(P.x,P.y-1,'\ud83c\udf3f Mar\u00e9cage','#2a6a4a');shake=.2}

const CONTRACT_TYPES=[TT.NOI,TT.AUL,TT.BOU,TT.ERA,TT.PIN,TT.FRE,TT.CHE,TT.HET,TT.IFS,TT.TIL,TT.SEQ,TT.PET];
const CONTRACT_ZONES={
  [TT.NOI]:'la lisière, près du village',
  [TT.AUL]:'la lisière, zones humides',
  [TT.BOU]:'la lisière, partout',
  [TT.ERA]:'la lisière profonde, vers le nord',
  [TT.PIN]:'la forêt mixte, au-delà de la lisière',
  [TT.FRE]:'la forêt mixte, zones denses',
  [TT.CHE]:'la forêt mixte profonde',
  [TT.HET]:'les profondeurs de la forêt mixte',
  [TT.IFS]:'la forêt ancienne, arbres sombres',
  [TT.TIL]:'la forêt ancienne, sous la canopée',
  [TT.SEQ]:'la forêt primordiale — danger extrême',
  [TT.PET]:'la forêt primordiale — bois pétrifié rare',
};
function generateContract(){
  // Progression by contracts completed — volumes force upgrades, types push deeper
  const ci=P._contractsDone||0;
  let type, amount, timeBonus=0;
  // === PHASE 1: Noisetier — learn, then grind (bag 30 → 45) ===
  if(ci===0){       type=TT.NOI; amount=3; timeBonus=120; // tutorial
  }else if(ci===1){ type=TT.NOI; amount=8;
  }else if(ci===2){ type=TT.NOI; amount=15;
  }else if(ci===3){ type=TT.NOI; amount=20; // fills base bag (30)
  }else if(ci===4){ type=TT.AUL; amount=12; // variety
  }else if(ci===5){ type=TT.NOI; amount=40; // forces bag upgrade 30→45
  // === PHASE 2: Bouleau — clear-cutting begins, corruption ===
  }else if(ci===6){ type=TT.BOU; amount=15;
  }else if(ci===7){ type=TT.BOU; amount=25;
  }else if(ci===8){ type=TT.BOU; amount=40; // forces bag upgrade 45→60
  }else if(ci===9){ type=TT.AUL; amount=30; // breathing room
  // === PHASE 3: Érable — push deeper into lisière ===
  }else if(ci===10){ type=TT.ERA; amount=12;
  }else if(ci===11){ type=TT.ERA; amount=20;
  }else if(ci===12){ type=TT.ERA; amount=35;
  // === PHASE 4: Pin/Frêne — transition, push toward mixte ===
  }else if(ci===13){ type=TT.PIN; amount=10;
  }else if(ci===14){ type=TT.FRE; amount=15;
  }else if(ci===15){ type=TT.PIN; amount=25;
  // === PHASE 5: Chêne/Hêtre — forêt mixte (needs axe 2) ===
  }else if(ci===16){ type=TT.CHE; amount=10;
  }else if(ci===17){ type=TT.HET; amount=15;
  }else if(ci===18){ type=TT.CHE; amount=25;
  }else if(ci===19){ type=TT.HET; amount=30;
  // === PHASE 6: Forêt ancienne (needs axe 3) ===
  }else if(ci===20){ type=TT.IFS; amount=8;
  }else if(ci===21){ type=TT.TIL; amount=12;
  }else if(ci===22){ type=TT.IFS; amount=20;
  // === PHASE 7+: Primordiale rotation ===
  }else{
    const pool=[TT.IFS,TT.TIL,TT.SEQ,TT.PET,TT.HET];
    type=pool[ci%pool.length];
    amount=8+Math.floor((ci-22)*1.5);
  }
  const ess=ESS[type];
  if(!ess)return;
  const pricePerUnit=ess.gold+Math.ceil(ess.gold*(0.3+ci*0.03));
  P._contract={
    type,
    name:ess.name,
    amount,
    pricePerUnit,
    deadline:gt+TUNING.contractTimeLimit+timeBonus+Math.min(amount*8,300),
    acceptedAt:gt,
    zone:CONTRACT_ZONES[type]||'la forêt',
    isTutorial:ci===0,
  };
}

function dSp(k,wx,wy,ox=0,oy=0,a=1){const s=_s[k];if(!s)return;if(a<1)X.globalAlpha=a;const hd=s._hd||1;const dw=s.width/hd*SC,dh=s.height/hd*SC;X.drawImage(s,0,0,s.width,s.height,(wx-smCam.x)*T*SC+ox*SC,(wy-smCam.y)*T*SC+oy*SC,dw,dh);if(a<1)X.globalAlpha=1}

function dGround(sx,sy,wx,wy){
  const tile=map[wy]?.[wx];if(tile===undefined)return;
  const cr=corr[wy]?.[wx]||0;
  const px2=sx*T*SC,py2=sy*T*SC,s=T*SC;

  // Village cobblestone
  if(tile===TT.VL){
    const vs=_s['gd_vl'];
    if(vs){const hd=vs._hd||1;X.drawImage(vs,0,0,vs.width,vs.height,px2,py2,vs.width/hd*SC,vs.height/hd*SC)}
    else{X.fillStyle=(wx+wy)%2?'#c9a86c':'#bfa060';X.fillRect(px2,py2,s,s)}
    return;
  }
  // Path worn dirt
  if(tile===TT.PA){
    const ps=_s['gd_pa'];
    if(ps){const hd=ps._hd||1;X.drawImage(ps,0,0,ps.width,ps.height,px2,py2,ps.width/hd*SC,ps.height/hd*SC)}
    else{X.fillStyle='#c9b98a';X.fillRect(px2,py2,s,s)}
    return;
  }
  // Water
  if(tile===TT.WA){const fi=Math.floor(gt*3)%8;const ws=_s['wa'+fi];if(ws)X.drawImage(ws,0,0,32,32,px2,py2,s,s);return}
  // River (flowing water — distinct blue with flow lines)
  if(tile===TT.RIVER){
    const fi=Math.floor(gt*3)%8;const ws=_s['wa'+fi];
    if(ws) X.drawImage(ws,0,0,32,32,px2,py2,s,s);
    else{X.fillStyle='#1a5a8a';X.fillRect(px2,py2,s,s)}
    // Flow lines overlay — white streaks moving south
    X.globalAlpha=0.15;X.fillStyle='#aaddff';
    const flowOff=Math.floor(gt*40)%s;
    for(let i=0;i<3;i++){
      const lx=px2+s*0.15+i*s*0.3;
      const ly=py2+((flowOff+i*s*0.35)%s);
      X.fillRect(lx,ly,s*0.08,s*0.25);
    }
    X.globalAlpha=1;
    // Darker edges to distinguish from ponds
    X.fillStyle='rgba(10,40,60,0.25)';
    X.fillRect(px2,py2,s*0.1,s);X.fillRect(px2+s*0.9,py2,s*0.1,s);
    return;
  }
  // Bridge (wooden planks over river — walkable)
  if(tile===TT.BRIDGE){
    // Draw river underneath
    const fi=Math.floor(gt*3)%8;const ws=_s['wa'+fi];
    if(ws) X.drawImage(ws,0,0,32,32,px2,py2,s,s);
    else{X.fillStyle='#1a5a8a';X.fillRect(px2,py2,s,s)}
    // Wooden planks
    X.fillStyle='#8a6a3a';X.fillRect(px2+s*0.1,py2,s*0.8,s);
    X.fillStyle='#7a5a2a';
    for(let i=0;i<4;i++){
      const py=py2+i*s*0.25+s*0.02;
      X.fillRect(px2+s*0.1,py,s*0.8,s*0.2);
      X.strokeStyle='#5a3a1a';X.lineWidth=1;X.strokeRect(px2+s*0.1,py,s*0.8,s*0.2);
    }
    // Railings
    X.fillStyle='#6a4a20';X.fillRect(px2+s*0.08,py2,s*0.06,s);X.fillRect(px2+s*0.86,py2,s*0.06,s);
    return;
  }
  // Village Barricade (spiky wooden fence)
  if(tile===TT.VIL_BARRICADE){
    X.fillStyle=(wx+wy)%2?'#c9a86c':'#bfa060';X.fillRect(px2,py2,s,s);
    // Stakes
    X.fillStyle='#6a4a20';
    for(let i=0;i<4;i++){
      const sx2=px2+s*0.1+i*s*0.22;
      X.fillRect(sx2,py2+s*0.15,s*0.12,s*0.7);
      // Pointed top
      X.beginPath();X.moveTo(sx2,py2+s*0.15);X.lineTo(sx2+s*0.06,py2);X.lineTo(sx2+s*0.12,py2+s*0.15);X.fill();
    }
    // Horizontal beams
    X.fillStyle='#5a3a15';X.fillRect(px2+s*0.05,py2+s*0.4,s*0.9,s*0.08);
    X.fillRect(px2+s*0.05,py2+s*0.65,s*0.9,s*0.08);
    return;
  }

  // Forest floor — HD textured ground tile
  if(cr>.5){
    // Heavily corrupted: use corruption tile
    const cs=_s['gd_cr'];
    if(cs){
      const hd=cs._hd||1;
      X.globalAlpha=Math.min(1,(cr-.3)*1.8);
      X.drawImage(cs,0,0,cs.width,cs.height,px2,py2,cs.width/hd*SC,cs.height/hd*SC);
      X.globalAlpha=1;
    }
  }
  if(cr>=.5){
    // Draw healthy tile underneath at reduced opacity
    const gv=(wx*3+wy*7)%8;const gs=_s['gd'+gv];
    if(gs){const hd=gs._hd||1;X.globalAlpha=Math.max(0,1-cr*1.5);X.drawImage(gs,0,0,gs.width,gs.height,px2,py2,gs.width/hd*SC,gs.height/hd*SC);X.globalAlpha=1}
    return;
  }

  // Normal/lightly corrupted ground
  const gv=(wx*3+wy*7)%8;const gs=_s['gd'+gv];
  if(gs){
    const hd=gs._hd||1;
    X.drawImage(gs,0,0,gs.width,gs.height,px2,py2,gs.width/hd*SC,gs.height/hd*SC);
  }else{
    const gi=(wx*7+wy*13)%PAL.grass.length;
    X.fillStyle=PAL.grass[gi];X.fillRect(px2,py2,s,s);
  }

  // Light corruption overlay (blending)
  if(cr>.05&&cr<.5){
    const cs=_s['gd_cr'];
    if(cs){const hd=cs._hd||1;X.globalAlpha=cr*1.5;X.drawImage(cs,0,0,cs.width,cs.height,px2,py2,cs.width/hd*SC,cs.height/hd*SC);X.globalAlpha=1}
  }

  // Corruption details on top
  if(cr>.2&&(wx*3+wy*7)%3===0){const ms=_s['mush'];if(ms){const mhd=ms._hd||1;X.globalAlpha=Math.min(1,(cr-.2)*2.5);X.drawImage(ms,0,0,ms.width,ms.height,px2+((wx*13)%5)*SC,py2+((wy*7)%5)*SC,ms.width/mhd*SC,ms.height/mhd*SC);X.globalAlpha=1}}
  if(cr>.45){X.strokeStyle=`rgba(50,15,70,${cr*.55})`;X.lineWidth=SC*1.5;X.beginPath();X.moveTo(px2,py2+s*((wx%3)/3));X.bezierCurveTo(px2+s*.3+Math.sin(gt*.5+wx)*s*.1,py2+s*.2,px2+s*.7,py2+s*.8,px2+s,py2+s*((wy%3)/3));X.stroke()}
  if(cr>.7){const pulse=.4+Math.sin(gt*3+wx+wy)*.2;X.globalAlpha=pulse;X.fillStyle=`rgba(70,20,90,${(cr-.7)})`;X.fillRect(px2+2*SC,py2+2*SC,3*SC,3*SC);X.fillRect(px2+s-5*SC,py2+s-5*SC,3*SC,3*SC);X.globalAlpha=1}
  // Sacred aura indicator (subtle golden shimmer)
  if(cr<0.05&&inSacredAura(wx,wy)){
    const ap=Math.sin(gt*1.5+wx*.3+wy*.7)*.03+.04;
    X.globalAlpha=ap;X.fillStyle='#ffd700';X.fillRect(px2,py2,s,s);X.globalAlpha=1;
  }
}

}

// ============ LIGHTING (much improved day/night) ============
function dLighting(){
  const ds=getDayState();
  const depth=Math.max(0,1-(P.y/MH));
  const nightMul=ds.nightMul||0;

  // Depth darkening (stronger at night)
  const depthDark=depth*(.3+nightMul*.2);
  let r=Math.floor(ds.r*(1-depthDark));
  let g=Math.floor(ds.g*(1-depthDark*.7));
  let b=Math.floor(ds.b*(1-depthDark*.85));

  // Clamp to very dark for true night feel
  r=Math.max(2,r);g=Math.max(1,g);b=Math.max(3,b);

  LX.fillStyle=`rgb(${r},${g},${b})`;
  LX.fillRect(0,0,LCV.width,LCV.height);

  LX.globalCompositeOperation='lighter';

  // Player torch - MUCH more dramatic at night
  // Smaller radius = tighter pool of light = scarier darkness around
  const torchIntensity=ds.sun<.35?(1-ds.sun/.35):0;
  if(torchIntensity>.02){
    const sx=(P.x-smCam.x)*T*SC,sy=(P.y-smCam.y)*T*SC;
    // Torch flicker with multiple frequencies for realism
    const flk1=Math.sin(gt*7.3)*.1,flk2=Math.sin(gt*11.7)*.05,flk3=Math.sin(gt*17.1)*.03;
    const flicker=torchIntensity*(.82+flk1+flk2+flk3);
    // Inner warm core
    const r1=(90+flk1*16)*SC;
    const gr1=LX.createRadialGradient(sx,sy-4*SC,0,sx,sy-4*SC,r1);
    gr1.addColorStop(0,`rgba(255,220,150,${flicker*1.1})`);
    gr1.addColorStop(.4,`rgba(255,180,100,${flicker*.7})`);
    gr1.addColorStop(1,'rgba(255,150,60,0)');
    LX.fillStyle=gr1;LX.fillRect(0,0,LCV.width,LCV.height);
    // Outer dim glow
    const r2=(150+flk2*20)*SC;
    const gr2=LX.createRadialGradient(sx,sy,0,sx,sy,r2);
    gr2.addColorStop(0,`rgba(255,170,80,${flicker*.35})`);
    gr2.addColorStop(.5,`rgba(255,130,50,${flicker*.12})`);
    gr2.addColorStop(1,'rgba(255,100,30,0)');
    LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
  }

  // Sacred tree glow
  const stX=Math.floor(smCam.x),stY=Math.floor(smCam.y);
  for(let y=-5;y<=VH+5;y++)for(let x=-4;x<=VW+4;x++){
    const wx=stX+x,wy=stY+y;
    if(wx>=0&&wy>=0&&wx<MW&&wy<MH){
      if(map[wy][wx]===TT.TJ){
        const lx=(wx-smCam.x)*T*SC+T*SC/2,ly=(wy-smCam.y)*T*SC;
        const pulse=.2+Math.sin(gt*1.5)*.1+nightMul*.15;
        const gr=LX.createRadialGradient(lx,ly,0,lx,ly,(50+nightMul*15)*SC);
        gr.addColorStop(0,`rgba(255,215,0,${pulse})`);gr.addColorStop(.5,`rgba(255,200,50,${pulse*.3})`);gr.addColorStop(1,'rgba(255,200,0,0)');
        LX.fillStyle=gr;LX.fillRect(0,0,LCV.width,LCV.height);
      }
      if(corr[wy]?.[wx]>.55&&(wx*5+wy*3)%7===0){
        const cr2=corr[wy][wx];const lx=(wx-smCam.x)*T*SC+T*SC/2,ly=(wy-smCam.y)*T*SC+T*SC/2;
        const pulse=(.05+Math.sin(gt*2+wx+wy)*.03)*(1+nightMul*.5);
        const gr=LX.createRadialGradient(lx,ly,0,lx,ly,(16+nightMul*8)*SC);
        gr.addColorStop(0,`rgba(120,40,180,${pulse*cr2})`);gr.addColorStop(1,'rgba(80,20,120,0)');
        LX.fillStyle=gr;LX.fillRect(0,0,LCV.width,LCV.height);
      }
    }
  }

  // Village warm light (brighter at night = refuge feeling)
  if(P.y>MH-16){
    const vlx=(64-smCam.x)*T*SC,vly=(MH-6-smCam.y)*T*SC;
    const warmth=.12+nightMul*.3;
    const gr=LX.createRadialGradient(vlx,vly,0,vlx,vly,(70+nightMul*25)*SC);
    gr.addColorStop(0,`rgba(255,195,120,${warmth})`);gr.addColorStop(.5,`rgba(255,160,80,${warmth*.25})`);gr.addColorStop(1,'rgba(255,130,60,0)');
    LX.fillStyle=gr;LX.fillRect(0,0,LCV.width,LCV.height);

    // Building-specific lights (scan visible tiles)
    const stX2=Math.floor(smCam.x),stY2=Math.floor(smCam.y);
    for(let y2=-4;y2<=VH+4;y2++)for(let x2=-4;x2<=VW+4;x2++){
      const wx=stX2+x2,wy=stY2+y2;
      if(wx<0||wy<0||wx>=MW||wy>=MH)continue;
      const t=map[wy][wx];
      const lx=(wx-smCam.x)*T*SC+T*SC/2,ly=(wy-smCam.y)*T*SC;
      const flk=Math.sin(gt*5+wx*3)*.04;

      if(t===TT.FORGE){
        // Forge: orange/red glow (fire)
        const p=.15+nightMul*.25+flk;
        const gr2=LX.createRadialGradient(lx,ly,0,lx,ly,(28+nightMul*12)*SC);
        gr2.addColorStop(0,`rgba(255,120,40,${p})`);gr2.addColorStop(.6,`rgba(255,80,20,${p*.3})`);gr2.addColorStop(1,'rgba(255,60,0,0)');
        LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
      }else if(t===TT.CHAM){
        // Chaman: green/teal glow (mystical)
        const p=.1+nightMul*.2+flk;
        const gr2=LX.createRadialGradient(lx,ly,0,lx,ly,(24+nightMul*10)*SC);
        gr2.addColorStop(0,`rgba(80,200,130,${p})`);gr2.addColorStop(.6,`rgba(40,150,90,${p*.3})`);gr2.addColorStop(1,'rgba(30,120,70,0)');
        LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
      }else if(t===TT.TAV){
        // Taverne: warm golden glow
        const p=.15+nightMul*.3+flk;
        const gr2=LX.createRadialGradient(lx,ly,0,lx,ly,(30+nightMul*14)*SC);
        gr2.addColorStop(0,`rgba(255,200,100,${p})`);gr2.addColorStop(.5,`rgba(255,170,60,${p*.3})`);gr2.addColorStop(1,'rgba(255,140,40,0)');
        LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
      }else if(t===TT.EMIS){
        // Émissaire: cold white/blue glow (industrial)
        const p=.08+nightMul*.18;
        const gr2=LX.createRadialGradient(lx,ly,0,lx,ly,(22+nightMul*10)*SC);
        gr2.addColorStop(0,`rgba(200,210,255,${p})`);gr2.addColorStop(.6,`rgba(160,180,240,${p*.3})`);gr2.addColorStop(1,'rgba(140,160,220,0)');
        LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
      }else if(t===TT.LAMP){
        // Lamp posts: warm point light
        const p=.12+nightMul*.35+flk*2;
        const gr2=LX.createRadialGradient(lx,ly-8*SC,0,lx,ly-8*SC,(16+nightMul*10)*SC);
        gr2.addColorStop(0,`rgba(255,200,120,${p})`);gr2.addColorStop(.5,`rgba(255,160,80,${p*.4})`);gr2.addColorStop(1,'rgba(255,120,40,0)');
        LX.fillStyle=gr2;LX.fillRect(0,0,LCV.width,LCV.height);
      }
    }
  }

  // Enemy eyes glow at night
  if(nightMul>.3){
    ents.forEach(e=>{
      const ex=(e.x-smCam.x)*T*SC,ey=(e.y-smCam.y)*T*SC;
      if(ex>-30*SC&&ey>-30*SC&&ex<LCV.width+30*SC&&ey<LCV.height+30*SC){
        const glowColor=e.tp==='go'?'rgba(255,50,0,':'rgba(160,80,255,';
        const gr=LX.createRadialGradient(ex,ey-4*SC,0,ex,ey-4*SC,12*SC);
        gr.addColorStop(0,glowColor+(nightMul*.2)+')');gr.addColorStop(1,glowColor+'0)');
        LX.fillStyle=gr;LX.fillRect(0,0,LCV.width,LCV.height);
      }
    });
    // Wolf eye glow at night (amber)
    wolves.forEach(w=>{
      const wx=(w.x-smCam.x)*T*SC,wy=(w.y-smCam.y)*T*SC;
      if(wx>-30*SC&&wy>-30*SC&&wx<LCV.width+30*SC&&wy<LCV.height+30*SC){
        const gr=LX.createRadialGradient(wx,wy-4*SC,0,wx,wy-4*SC,10*SC);
        gr.addColorStop(0,'rgba(255,220,0,'+(nightMul*.15)+')');gr.addColorStop(1,'rgba(255,220,0,0)');
        LX.fillStyle=gr;LX.fillRect(0,0,LCV.width,LCV.height);
      }
    });
  }

  LX.globalCompositeOperation='source-over';
}

// ============ FX LAYER ============
function dFX(){
  FX.clearRect(0,0,FCV.width,FCV.height);
  const ds=getDayState();
  const depth=Math.max(0,1-(P.y/MH));
  const nightMul=ds.nightMul||0;

  // === ADDITIONAL NIGHT DARKNESS OVERLAY ===
  // This stacks ON TOP of the multiply layer for truly dark nights
  if(nightMul>.05){
    // Dark wash over everything
    FX.fillStyle=`rgba(2,1,8,${nightMul*.45})`;
    FX.fillRect(0,0,FCV.width,FCV.height);
    // Cut out circle around player (torch cone)
    if(nightMul>.15){
      const sx=(P.x-smCam.x)*T*SC,sy=(P.y-smCam.y)*T*SC;
      const flk=Math.sin(gt*7)*.05+Math.sin(gt*11)*.03;
      const cutR=(110+flk*30)*SC;
      const gr=FX.createRadialGradient(sx,sy,0,sx,sy,cutR);
      gr.addColorStop(0,`rgba(2,1,8,${-nightMul*.55})`); // subtract
      gr.addColorStop(.3,'rgba(0,0,0,0)');
      gr.addColorStop(1,'rgba(0,0,0,0)');
      FX.globalCompositeOperation='destination-out';
      const gr2=FX.createRadialGradient(sx,sy,0,sx,sy,cutR);
      gr2.addColorStop(0,`rgba(0,0,0,${nightMul*.5})`);
      gr2.addColorStop(.4,`rgba(0,0,0,${nightMul*.25})`);
      gr2.addColorStop(1,'rgba(0,0,0,0)');
      FX.fillStyle=gr2;FX.fillRect(0,0,FCV.width,FCV.height);
      FX.globalCompositeOperation='source-over';
    }
  }

  // Canopy parallax
  if(depth>.2){
    canopyP.forEach(cp=>{
      const spr=_s['cp'+cp.v];if(!spr)return;
      const px2=(cp.x-smCam.x*.7)*T*SC,py2=(cp.y-smCam.y*.7)*T*SC;
      FX.globalAlpha=cp.a*(cp.l/cp.ml)*Math.min(1,(depth-.2)*2)*(1-nightMul*.5);
      FX.drawImage(spr,0,0,spr.width,spr.height,px2,py2,spr.width*SC*2,spr.height*SC*2);
    });
    FX.globalAlpha=1;
  }

  // Fog layer (denser at night, colored by phase)
  const totalFog=Math.max(ds.fog||0, depth>.4?(depth-.4)*.15:0);
  if(totalFog>0){
    const fogR=nightMul>.3?8:180, fogG=nightMul>.3?5:200, fogB=nightMul>.3?18:190;
    FX.fillStyle=`rgba(${fogR},${fogG},${fogB},${totalFog*(nightMul>.3?1.5:.3)})`;
    FX.fillRect(0,0,FCV.width,FCV.height);
    // Animated fog wisps
    for(let i=0;i<4;i++){
      const fx=Math.sin(gt*.25+i*1.7)*FCV.width*.35+FCV.width/2;
      const fy=FCV.height*.35+Math.cos(gt*.18+i*2.3)*FCV.height*.25;
      const gr=FX.createRadialGradient(fx,fy,0,fx,fy,(80+i*20)*SC);
      gr.addColorStop(0,`rgba(${fogR},${fogG},${fogB},${totalFog*.12})`);gr.addColorStop(1,'rgba(0,0,0,0)');
      FX.fillStyle=gr;FX.fillRect(0,0,FCV.width,FCV.height);
    }
  }

  // Sky color tint (dawn/dusk wash)
  if(ds.tint&&ds.tint!=='#e4ece8'){
    const gr=FX.createLinearGradient(0,0,0,FCV.height);
    FX.globalAlpha=.1;
    gr.addColorStop(0,ds.tint);gr.addColorStop(.4,'rgba(0,0,0,0)');
    FX.fillStyle=gr;FX.fillRect(0,0,FCV.width,FCV.height);
    FX.globalAlpha=1;
  }

  // Vignette (much stronger at night)
  const vigStr=.18+depth*.1+nightMul*.35;
  const vigG=FX.createRadialGradient(FCV.width/2,FCV.height/2,FCV.width*.28,FCV.width/2,FCV.height/2,FCV.width*.68);
  vigG.addColorStop(0,'rgba(0,0,0,0)');vigG.addColorStop(1,`rgba(0,0,0,${Math.min(.85,vigStr)})`);
  FX.fillStyle=vigG;FX.fillRect(0,0,FCV.width,FCV.height);
}

function dUI(){
  const depth=Math.max(0,MH-12-Math.floor(P.y));
  const biome=P.y>=MH-12?'Village':P.x<86?'Boréal':P.x>170?'Marécage':P.y<40?'Forêt Primordiale':P.y<100?'Forêt Ancienne':P.y<170?'Forêt Mixte':'Lisière';
  const hp=Math.max(0,P.hp/P.mhp*100),st=Math.max(0,P.sta/P.msta*100);
  const hc=hp>50?'#52b788':hp>25?'#e9c46a':'#e74c3c';
  const used=invUsed(),cap=P.invCap,invPct=Math.min(100,used/cap*100);
  const invCol=invPct>90?'#e74c3c':invPct>70?'#e9c46a':'#8B6914';
  const durMax=TUNING.axeBaseDur+TUNING.axeDurPerLevel*(P.axe-1);
  const durPct=Math.max(0,P._axeDur/durMax*100);
  const durCol=durPct>50?'#e9c46a':durPct>20?'#e67e22':'#e74c3c';
  let extra=`🪓 Niv.${P.axe} <span class="br" style="width:50px;display:inline-block;vertical-align:middle"><span class="bf" style="width:${durPct}%;background:${durCol}"></span></span>${P._axeDur<1?' ⚠️':''} · 📏 ${depth}m · 🌲 ${biome}`;
  if(P._sacredLore&&P._sacredLore.length>0) extra+=` · 📜 ${P._sacredLore.length}/${SACRED_LORE.length}`;
  if(P._saplings>0) extra+=` \ud83c\udf31${P._saplings}`;
  if(P._purificationPct>0) extra+=` \ud83c\udf3f${P._purificationPct}%`;
  if(guardian&&!guardian.defeated) extra+=` \u2694\ufe0f GARDIEN`;
  if(bossEast&&!bossEast.defeated) extra+=` \ud83e\udea4 PIEUVRE`;
  if(bossWest&&!bossWest.defeated) extra+=` \ud83d\udc3b OURS`;
  if(wolves.length>0) extra+=` · <span style="color:#ccaa00">\ud83d\udc3a ${wolves.length}</span>`;
  if(P._encens&&gt<P._encens) extra+=` · 🌀${Math.ceil(P._encens-gt)}s`;
  document.getElementById('st').innerHTML=`❤️ <span class="br"><span class="bf" style="width:${hp}%;background:${hc}"></span></span> ${P.hp}/${P.mhp}<br>⚡ <span class="br"><span class="bf" style="width:${st}%;background:#3d85c6"></span></span><br>📦 <span class="br"><span class="bf" style="width:${invPct}%;background:${invCol}"></span></span> ${used}/${cap}<br>${extra}`;
  let invLine=`🪵 ${P.w} (${P.wv||0} 💰) · 💧 ${P.sap} · 💰 ${P.g}`;
  if(P._potions>0||P._encensStock>0) invLine+=` · 🧪${P._potions||0} 🌀${P._encensStock||0}`;
  if(P.herbs>0||P.mushrooms>0) invLine+=` · 🌿${P.herbs} 🍄${P.mushrooms}`;
  if(P._debt>0) invLine+=` · <span style="color:${P._debt>100?'#e74c3c':'#e9c46a'}">📋 Dette:${P._debt}${P._debt>100?' ⚠️':''}</span>`;
  if(P._contract){
    const ct=P._contract;
    const timeLeft=Math.max(0,ct.deadline-gt);
    const isLate=timeLeft<=0;
    const held=P.woodByType[ct.type]||0;
    const prog=Math.min(held,ct.amount);
    if(isLate) invLine+=`<br><span style="color:#e74c3c">📜 ${ct.amount}×${ct.name} ⏰ RETARD (${prog}/${ct.amount})</span>`;
    else invLine+=`<br><span style="color:#DAA520">📜 ${ct.amount}×${ct.name} ⏱️${timeLeft>60?Math.floor(timeLeft/60)+'m':Math.floor(timeLeft)+'s'} (${prog}/${ct.amount})</span>`;
  }
  document.getElementById('inv').innerHTML=invLine;
  const ds=getDayState();
  document.getElementById('time-ind').textContent=ds.name;
}

function updBossEast(d){

function updBossWest(d){

  b.chargeTimer-=d;

let guardian = null;
function spawnGuardian(px,py){
  const pp = window._primPos || {x:64,y:10};
  guardian = {
    x:pp.x+3, y:pp.y+3,
    hp:40, mhp:40,

    ht:0,     // hit timer
    at:0,     // attack timer

    spd:.6,
    dmg:3,
    rootTimer:0,
    projTimer:0,

  };
  // Dramatic screen effects

function updGuardian(d){
  if(!guardian || guardian.defeated) return;
  const g=guardian;
  g.ht=Math.max(0,g.ht-d);
  g.roar=Math.max(0,g.roar-d);
  if(g.roar>0) return; // frozen during roar
  
  // Phase transition
  if(g.hp<=g.mhp*.4 && g.phase===1){
    g.phase=2;g.spd=.9;g.dmg=4;
    ft2(g.x,g.y-2,'LE GARDIEN EST EN RAGE !','#ff0000');
    shake=1.5;sp(g.x,g.y,'#8b0000',20);
  }
  
  // Movement - circle around primordial tree
  const pp=window._primPos||{x:64,y:10};
  const dx=P.x-g.x, dy=P.y-g.y, dist=Math.sqrt(dx*dx+dy*dy);
  
  if(dist<12){
    // Chase player
    g.x += (dx/dist)*g.spd*d;
    g.y += (dy/dist)*g.spd*d;
  } else {
    // Orbit the tree
    const angle=Math.atan2(g.y-pp.y, g.x-pp.x)+d*.3;
    const orbitR=5;
    g.x=pp.x+Math.cos(angle)*orbitR;
    g.y=pp.y+Math.sin(angle)*orbitR;
  }
  
  // Melee damage
  if(dist<1.2 && P.iv<=0){
    hurtP(g.dmg,1.2,.4,.8,'#8b0000',10,g);
  }
  
  // Root attack (phase 1+2)
  g.rootTimer-=d;
  if(g.rootTimer<=0){
    g.rootTimer=g.phase===2?2.5:4;
    // Spawn root hazards near player
    for(let i=0;i<(g.phase===2?4:2);i++){
      const rx=P.x+(Math.random()-.5)*6, ry=P.y+(Math.random()-.5)*6;
      rootHazards.push({x:rx,y:ry,timer:1.2,dmg:2,warned:false,warnT:.6});
    }
  }
  
  // Projectile attack (phase 2 only)
  if(g.phase===2){
    g.projTimer-=d;
    if(g.projTimer<=0){
      g.projTimer=1.5;
      const angle2=Math.atan2(P.y-g.y,P.x-g.x);
      bossProjs.push({x:g.x,y:g.y,vx:Math.cos(angle2)*5,vy:Math.sin(angle2)*5,life:3,dmg:2});
    }
  }
  
  // Take damage from player
  // (handled in enemy hit code - we check proximity to guardian in swing)
}

let rootHazards = [];
let bossProjs = [];

function updBossEffects(d){
  // Root hazards
  for(let i=rootHazards.length-1;i>=0;i--){
    const r=rootHazards[i];
    r.timer-=d;
    if(!r.warned && r.timer<r.warnT){r.warned=true;sp(r.x,r.y,'#8b4513',3)}
    if(r.timer<=0){
      // Eruption!
      sp(r.x,r.y,'#5a3a1a',8);shake=.2;
      const dx2=P.x-r.x,dy2=P.y-r.y;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<1.5 && P.iv<=0){
        hurtP(r.dmg,.8,.3,.5,'#8b0000',6);
      }
      rootHazards.splice(i,1);
    }
  }
  // Boss projectiles
  for(let i=bossProjs.length-1;i>=0;i--){
    const p=bossProjs[i];
    p.x+=p.vx*d;p.y+=p.vy*d;p.life-=d;
    const dx3=P.x-p.x,dy3=P.y-p.y;
    if(Math.sqrt(dx3*dx3+dy3*dy3)<.8 && P.iv<=0){
      hurtP(p.dmg,.6,.2,.4,'#6b2fa0',8);
      bossProjs.splice(i,1);
      continue;
    }
    if(p.life<=0)bossProjs.splice(i,1);
  }
}

// ============ PURIFICATION SYSTEM ============
function canPlantSeed(tx,ty){
  // Can plant on clean (non-corrupted) soil that is either grass or stump with low corruption
  if(!map[ty]||tx<0||ty<0||tx>=MW||ty>=MH)return false;
  const tile=map[ty][tx];
  const cr=(corr[ty]&&corr[ty][tx])||0;
  if(cr>0.2)return false; // Cannot plant on corrupted soil
  if(tile===TT.ST||tile===TT.G)return P.seeds>0;
  return false;
}
function plantSeed(tx,ty){
  if(!canPlantSeed(tx,ty))return;
  // Determine seed species based on biome
  const biome=ty<40?3:ty<100?2:ty<170?1:0;
  const seedEss=biome===0?TT.BOU:biome===1?TT.PIN:biome===2?TT.IFS:TT.SEQ;
  map[ty][tx]=TT.SEED_TILE;
  if(!regrowMap[ty])regrowMap[ty]=[];
  regrowMap[ty][tx]={ess:seedEss,time:gt+300,planted:true}; // 1 day/night cycle (~300s)
  P.seeds--;
  P._seedsPlanted=(P._seedsPlanted||0)+1;
  P._saplings++;
  addRestauration(2); // planting is restoration
  ft2(tx+.5,ty-.5,'🌱 Graine plantée!','#52b788');
  sp(tx+.5,ty+.5,'#52b788',8);sfxPickup();
  // Reduce corruption slightly
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    const nx=tx+dx,ny=ty+dy;
    if(ny>=0&&ny<MH&&nx>=0&&nx<MW&&corr[ny]&&corr[ny][nx]!==undefined){
      corr[ny][nx]=Math.max(0,corr[ny][nx]-0.1);
    }
  }
  setTimeout(checkPurification,50);
}
function plantArbreChant(tx,ty){
  // Plant the unique Arbre-Chant seed
  if(!P._hasArbreChantSeed)return;
  const cr=(corr[ty]&&corr[ty][tx])||0;
  if(cr>0.1){ft2(P.x,P.y,'Sol trop corrompu pour l\'Arbre-Chant','#e74c3c');return}
  if(map[ty][tx]!==TT.G&&map[ty][tx]!==TT.ST){ft2(P.x,P.y,'Terrain inadapté','#e74c3c');return}
  map[ty][tx]=TT.SEED_TILE;
  regrowMap[ty][tx]={ess:TT.ARBRE_CHANT,time:gt+300,planted:true}; // 1 cycle
  P._hasArbreChantSeed=false;
  P._arbreChantPlanted=true;
  P._arbreChantPos={x:tx,y:ty};
  ft2(tx+.5,ty-1,'🌳 L\'Arbre-Chant est planté!','#daa520');
  ft2(tx+.5,ty-2,'Sa lumière se répand...','#ffd700');
  sp(tx+.5,ty+.5,'#ffd700',20);sp(tx+.5,ty+.5,'#52b788',15);
  shake=.5;sfxLore();
  setTimeout(()=>{_sacredAuraDirty=true;checkPurification()},100);
}
// Seed growth system
let _seedGrowT=0;
function updSeedGrowth(d){
  _seedGrowT+=d;if(_seedGrowT<3)return;_seedGrowT=0;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    if(map[y][x]===TT.SEED_TILE){
      const rg=regrowMap[y]?.[x];
      if(rg&&gt>=rg.time){
        map[y][x]=rg.ess;
        // Mark as player-planted for auto-regrow
        if(!regrowMap[y])regrowMap[y]=[];
        regrowMap[y][x]={ess:rg.ess,time:0,planted:true};
        const dx2=x-P.x,dy2=y-P.y;
        if(Math.sqrt(dx2*dx2+dy2*dy2)<16){
          sp(x+.5,y+.5,'#52b788',10);
          ft2(x+.5,y,'🌳 Arbre mature!','#74c69d');
          sfxPickup();
        }
        // If this is an Arbre-Chant, rebuild sacred aura
        if(rg.ess===TT.ARBRE_CHANT)_sacredAuraDirty=true;
      }
    }
  }
}
function performRitual(){
  // Enhanced: works on corrupted stumps, costs essences + sap
  // Check: near a corrupted stump or sacred tree
  const px2=Math.floor(P.x),py2=Math.floor(P.y);
  let nearTarget=false;
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    const nx=px2+dx,ny=py2+dy;
    if(nx>=0&&ny>=0&&nx<MW&&ny<MH){
      const t=map[ny][nx];
      const cr=(corr[ny]&&corr[ny][nx])||0;
      if(t===TT.TJ||t===TT.ARBRE_CHANT||(t===TT.ST&&cr>0.2))nearTarget=true;
    }
  }
  if(!nearTarget){ft2(P.x,P.y,'Approche une souche corrompue ou un arbre sacré','#e9c46a');return false}
  // Cost: spiritual essences + sap
  const eCost=TUNING.purifyEssenceCost;
  const sCost=TUNING.purifySapCost;
  if((P.essences||0)<eCost){ft2(P.x,P.y,`Pas assez d'essences (${P.essences||0}/${eCost})`,'#e74c3c');return false}
  if(P.sap<sCost){ft2(P.x,P.y,`Pas assez de sève (${P.sap}/${sCost})`,'#e74c3c');return false}
  P.essences-=eCost;
  P.sap-=sCost;
  P._ritualsPerformed++;sfxPurify();
  ft2(P.x,P.y,'🌀 Rituel de purification!','#74c69d');
  sp(P.x,P.y,'#52b788',15);sp(P.x,P.y,'#ffd700',10);
  // Purify corruption in radius
  const r=TUNING.purifyRadius;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const nx=px2+dx,ny=py2+dy;
    if(ny>=0&&ny<MH&&nx>=0&&nx<MW&&corr[ny]){
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<r){
        corr[ny][nx]=Math.max(0,corr[ny][nx]-0.5*(1-dist/r));
        // Remove corruption sources that are fully purified
        if(corr[ny][nx]<0.05&&corrSrc[ny]&&corrSrc[ny][nx]){
          corrSrc[ny][nx]=false;
          _corrSources=_corrSources.filter(([sx,sy])=>sx!==nx||sy!==ny);
        }
      }
    }
  }
  P._zonesRestored=(P._zonesRestored||0)+1;
  addRestauration(5); // ritual purification is a major restoration act
  shake=.4;
  checkPurification();
  return true;
}
function checkPurification(){
  // Sample-based corruption check (every 4th tile for performance on 256×220)
  let total=0,corrupted=0;
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){
    if(map[y]&&map[y][x]!==TT.WA){total++;if(corr[y]&&corr[y][x]>.1)corrupted++}
  }
  P._purificationPct=Math.round((1-corrupted/Math.max(1,total))*100);
  // Check for purify ending ("Réparateur")
  if(P._purificationPct>=95 && P._saplings>=15 && P._ritualsPerformed>=3 && P._guardianDefeated && (P._zonesRestored||0)>=5){
    P._ending='purify';
    triggerEnding('purify');
  }
}

function doBuildBridge(rx,ry){

function doBuildBarricade(){
  const barrCost=8;
  if(P.w<barrCost){ft2(P.x,P.y,'Pas assez de bûches!','#e74c3c');return}
  if(!P._hasBarricadePlan){ft2(P.x,P.y,'Il te faut les plans!','#e74c3c');return}
  P.w-=barrCost;
  P.wv=Math.max(0,(P.wv||0)-barrCost);
  // Place barricade at northern edge of village
  const CX=128, VIL_Y=MH-12;
  let placed=false;
  const barrY=VIL_Y-1;
  // Find empty spots along the village border
  for(let bx=CX-12;bx<=CX+12;bx++){
    if(barrY>=0&&barrY<MH&&bx>=0&&bx<MW){
      const t=map[barrY][bx];
      if(t===TT.G||t===TT.PA||t===TT.BU||t===TT.FL){
        map[barrY][bx]=TT.VIL_BARRICADE;
        placed=true;
        P._barricadesBuilt=(P._barricadesBuilt||0)+1;
        break;
      }
    }
  }
  if(placed){
    shake=.2;sp(P.x,P.y,'#8a6a3a',8);
    ft2(P.x,P.y,'🛡️ Barricade installée!','#b58863');
    addRestauration(1);

    ft2(P.x,P.y,'Plus de place pour les barricades!','#e74c3c');

  }
}
// Check if village is protected by barricades (enough barricades = protected)
function vilBarricadeLevel(){
  return Math.min(1,(P._barricadesBuilt||0)/10); // 10 barricades = fully protected
}
// Village unrest system: mobs near village increase unrest, barricades reduce it
let _vilUnrestT=0;
function updVilUnrest(d){
  _vilUnrestT+=d;if(_vilUnrestT<2)return;_vilUnrestT=0;
  const VIL_Y=MH-12,CX=128;
  const vilRadius=20; // check mobs within 20 tiles of village center
  let nearbyMobs=0;
  for(const e of ents){
    const dx=e.x-CX,dy=e.y-VIL_Y;
    if(Math.sqrt(dx*dx+dy*dy)<vilRadius) nearbyMobs++;
  }
  // Barricades repel: each barricade reduces effective mob count
  const barrProtection=vilBarricadeLevel();
  const effectiveMobs=Math.max(0,nearbyMobs-Math.floor(barrProtection*8));
  // Update unrest: rises with mobs, decays without
  if(effectiveMobs>0){
    P._vilUnrest=Math.min(100,(P._vilUnrest||0)+effectiveMobs*2);
  }else{
    P._vilUnrest=Math.max(0,(P._vilUnrest||0)-1);
  }
  // Barricades physically block mobs: push away mobs that hit barricade tiles
  for(const e of ents){
    const etx=Math.floor(e.x),ety=Math.floor(e.y);
    if(etx>=0&&ety>=0&&etx<MW&&ety<MH&&map[ety][etx]===TT.VIL_BARRICADE){
      // Push mob north (away from village)
      e.y-=1.5;e.hp-=1; // barricades damage mobs slightly
      sp(e.x,e.y,'#8a6a3a',5);
    }
  }
  // Also check river tiles to detect first river sighting
  if(!P._riverSeen){
    const px2=Math.floor(P.x),py2=Math.floor(P.y);
    for(let dy=-VH;dy<=VH;dy++)for(let dx=-VW;dx<=VW;dx++){
      const nx=px2+dx,ny=py2+dy;
      if(nx>=0&&ny>=0&&nx<MW&&ny<MH&&map[ny][nx]===TT.RIVER){
        P._riverSeen=true;
        ft2(P.x,P.y-1.5,'🏗️ Un architecte est arrivé au village!','#b58863');
        spawnArchitect();
        return;
      }
    }
  }
}

function drawEndScene(type,phase){
  const cv=document.getElementById('end-canvas');
  if(!cv)return;
  const c=cv.getContext('2d');
  c.clearRect(0,0,800,500);
  
  if(type==='deposit'||type==='protect'){
    // Forest scene - alive, peaceful, sunlight through canopy
    c.fillStyle='#0a1a08';c.fillRect(0,0,800,500);
    // Trees
    for(let i=0;i<12;i++){
      const tx=40+i*65,ty=200+Math.sin(i)*30;
      c.fillStyle='#3a2a10';c.fillRect(tx,ty,16,200);
      c.fillStyle=`hsl(${110+i*5},50%,${25+phase*2}%)`;
      c.beginPath();c.arc(tx+8,ty-20,30+Math.random()*10,0,Math.PI*2);c.fill();
    }
    // Sunbeams
    c.fillStyle='rgba(255,220,100,0.06)';
    for(let i=0;i<5;i++){c.beginPath();c.moveTo(200+i*120,0);c.lineTo(150+i*120,500);c.lineTo(250+i*120,500);c.fill()}
    // Primordial tree center
    c.fillStyle='#5a4020';c.fillRect(370,100,60,300);
    c.fillStyle='#2a6a2a';c.beginPath();c.arc(400,80,90,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,215,0,0.2)';c.beginPath();c.arc(400,80,70,0,Math.PI*2);c.fill();
    // Axe at base of tree (deposited)
    if(type==='deposit'){
      c.fillStyle='#8a7050';c.fillRect(385,395,6,30);
      c.fillStyle='#aaa';c.beginPath();c.moveTo(380,395);c.lineTo(400,388);c.lineTo(400,402);c.fill();
    }
  }else if(type==='cut'){
    // Dead forest - grey, stumps, cracked earth
    c.fillStyle='#1a1210';c.fillRect(0,0,800,500);
    // Dead stumps
    for(let i=0;i<15;i++){
      const tx=30+i*52;
      c.fillStyle='#3a3028';c.fillRect(tx,320,20,80);
      c.fillStyle='#2a2018';c.fillRect(tx-2,318,24,6);
    }
    // Cracked ground
    c.strokeStyle='#4a3a2a';c.lineWidth=2;
    for(let i=0;i<8;i++){
      c.beginPath();c.moveTo(Math.random()*800,350);
      c.lineTo(Math.random()*800,500);c.stroke();
    }
    // Grey sky
    c.fillStyle='rgba(80,70,60,0.3)';c.fillRect(0,0,800,200);
    // Fallen primordial trunk
    c.fillStyle='#4a3820';c.fillRect(200,280,400,40);
    c.fillStyle='#3a2810';c.fillRect(190,310,30,30);
  }else if(type==='renounce'){
    // Scarred forest - damaged but standing, amber tones
    c.fillStyle='#12150a';c.fillRect(0,0,800,500);
    // Damaged trees still standing
    for(let i=0;i<10;i++){
      const tx=50+i*75,ty=210+Math.sin(i*1.3)*25;
      c.fillStyle='#3a2a10';c.fillRect(tx,ty,14,190);
      c.fillStyle=`hsl(${45+i*3},40%,${25+phase}%)`;
      c.beginPath();c.arc(tx+7,ty-15,25+Math.random()*8,0,Math.PI*2);c.fill();
    }
    // Wounded primordial tree - still standing with scars
    c.fillStyle='#5a4020';c.fillRect(370,110,60,290);
    c.fillStyle='#2a5a2a';c.beginPath();c.arc(400,90,80,0,Math.PI*2);c.fill();
    // Scars on trunk
    c.strokeStyle='#8a6a40';c.lineWidth=3;
    c.beginPath();c.moveTo(380,180);c.lineTo(395,250);c.stroke();
    c.beginPath();c.moveTo(410,200);c.lineTo(420,270);c.stroke();
    // Amber haze
    c.fillStyle='rgba(233,196,106,0.08)';c.fillRect(0,0,800,500);
  }else{
    // Purify / Restoration - golden light, saplings growing, brilliant
    c.fillStyle='#0a1a08';c.fillRect(0,0,800,500);
    // Growing saplings
    for(let i=0;i<20;i++){
      const tx=20+i*40,h=30+Math.random()*60;
      c.fillStyle='#3a5a2a';c.fillRect(tx+4,350-h,8,h);
      c.fillStyle=`hsl(${100+Math.random()*30},60%,${40+Math.random()*20}%)`;
      c.beginPath();c.arc(tx+8,350-h-10,12+Math.random()*8,0,Math.PI*2);c.fill();

    c.fillStyle='#6a5020';c.fillRect(360,60,80,340);
    c.fillStyle='#3a8a3a';c.beginPath();c.arc(400,50,110,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,215,0,0.35)';c.beginPath();c.arc(400,50,90,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,255,200,0.15)';c.beginPath();c.arc(400,30,130,0,Math.PI*2);c.fill();
    // Golden particles

      c.fillRect(100+Math.random()*600,50+Math.random()*300,3,3);
    }
  }
}

function advanceEnding(){
  if(!endingActive)return;
  const type=P._ending;
  const scenes=ENDINGS[type].scenes;
  if(endCharIdx<scenes[endPhase].text.length){
    endCharIdx=scenes[endPhase].text.length;
    document.getElementById('end-text').textContent=scenes[endPhase].text;
  }else{
    endPhase++;endTimer=0;endCharIdx=0;endTypeTimer=0;
    if(endPhase>=scenes.length){
      // Game over
      const ov=document.getElementById('ending-overlay');
      ov.style.transition='opacity 2s';ov.style.opacity='0';
      setTimeout(()=>{ov.style.display='none';endingActive=false},2000);
      return;
    }
    drawEndScene(type,endPhase);
  }
}

function updateEnding(){
  if(!endingActive)return;
  const type=P._ending;
  const scenes=ENDINGS[type].scenes;
  if(endPhase>=scenes.length)return;
  const scene=scenes[endPhase];
  endTypeTimer+=1/60;
  if(endCharIdx<scene.text.length && endTypeTimer>0.04){
    endTypeTimer=0;endCharIdx++;
    document.getElementById('end-text').textContent=scene.text.substring(0,endCharIdx);
  }
  endTimer+=1/60;
  if(endTimer>scene.dur && endCharIdx>=scene.text.length){
    endPhase++;endTimer=0;endCharIdx=0;endTypeTimer=0;
    if(endPhase>=scenes.length){
      document.getElementById('end-text').textContent='';
      return;
    }
    drawEndScene(type,endPhase);
  }
}

let _vilBarricade=false, _vilCarto=false, _vilAnthro=false, _vilLuthier=false;
function evolveVillage(){
  const VIL_Y=MH-12, CX=128;
  // Barricades after first corruption
  if(P._firstCorruption && !_vilBarricade){
    _vilBarricade=true;
    // Place barricades at village entrance (north edge)
    for(let x=CX-12;x<=CX+12;x++){
      const vy=VIL_Y;
      if(vy>=0 && vy<MH && x>=0 && x<MW){
        if(Math.abs(x-CX)>1 && (map[vy][x]===TT.G||map[vy][x]===TT.VL||map[vy][x]===TT.FL)){
          map[vy][x]=TT.BARR;
        }
      }
    }
    ft2(P.x,P.y-1,'Le village se barricade...','#8b4513');
  }
  // Cartographer arrives after reaching biome 2 (Foret Mixte)
  if(P._deepestBiome>=1 && !_vilCarto){
    _vilCarto=true;
    const cx=CX+10, cy=VIL_Y+5;
    if(cy<MH && cx<MW){
      map[cy][cx]=TT.CARTO;
      ft2(P.x,P.y-1.5,'Un cartographe a rejoint le village!','#4a90d9');
    }
  }
  // Anthropologist arrives after first sacred tree
  if(P._firstSacredTree && !_vilAnthro){
    _vilAnthro=true;
    const cx=CX-10, cy=VIL_Y+5;
    if(cy<MH && cx<MW){
      map[cy][cx]=TT.ANTHRO;
    }
  }
  // Luthier arrives at village after first rare wood cut
  if(P._luthierArrived && !_vilLuthier){
    _vilLuthier=true;
    const cx=CX+11, cy=VIL_Y+3;
    if(cy<MH && cx<MW){
      map[cy][cx]=TT.LUTH;
      ft2(P.x,P.y-1,'🎻 Le luthier s\'installe au village!','#d4a017');
    }
  }
}

function updateIntro(d){
  const ic=document.getElementById('intro-cin');
  if(!ic||ic.style.display==='none')return;
  if(introPhase>=INTRO_SCENES.length){
    // Fade out
    ic.style.transition='opacity 0.8s';ic.style.opacity='0';
    setTimeout(()=>{ic.style.display='none';introActive=false;P._introSeen=true;},800);
    introPhase=999; // prevent re-trigger
    return;
  }
  drawIntroScene(introPhase);
  const scene=INTRO_SCENES[introPhase];
  const itxt=document.getElementById('intro-text');
  
  // Typing with controlled speed — ~14 chars/sec (one char every ~70ms)
  introTypeTimer+=d;
  if(introCharIdx2<scene.text.length && introTypeTimer>0.07){
    introTypeTimer=0;
    introCharIdx2++;
    itxt.textContent=scene.text.substring(0,introCharIdx2);
  }
  
  introTimer+=d;
  if(introTimer>scene.dur&&introCharIdx2>=scene.text.length){
    // Fade text between scenes
    itxt.style.transition='opacity 0.4s';itxt.style.opacity='0';
    setTimeout(()=>{itxt.style.opacity='1';itxt.style.transition='';},400);
    introPhase++;introTimer=0;introCharIdx2=0;introTypeTimer=0;
  }
}
function skipIntro(){
  if(!introActive||introPhase>=INTRO_SCENES.length)return;
  const scene=INTRO_SCENES[introPhase];
  if(introCharIdx2<scene.text.length){
    introCharIdx2=scene.text.length;
    document.getElementById('intro-text').textContent=scene.text;
    introTimer=Math.max(introTimer,scene.dur-1.5); // fast-forward hold time too
  }else{
    introPhase++;introTimer=0;introCharIdx2=0;introTypeTimer=0;
    if(introPhase>=INTRO_SCENES.length){
      const ic=document.getElementById('intro-cin');
      ic.style.transition='opacity 0.6s';ic.style.opacity='0';
      setTimeout(()=>{ic.style.display='none';introActive=false;P._introSeen=true;},600);
      introPhase=999;
    }
  }
}
document.getElementById('intro-cin').addEventListener('click',skipIntro);
// Also skip with space/enter
document.addEventListener('keydown',e=>{if(introActive&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();skipIntro()}});

// Auto-scale to fit viewport
function fitScreen(){
  const gc=document.getElementById('gc');
  const vw=window.innerWidth,vh=window.innerHeight;
  const cw=VW*T*SC,ch=VH*T*SC;
  const scale=Math.min(vw/cw,vh/ch,1);
  gc.style.transform=`scale(${scale})`;
}
fitScreen();
window.addEventListener('resize',fitScreen);

requestAnimationFrame(loop);
</script>
