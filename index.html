  }
  const ending=ENDINGS[type];
  ov.style.background=type==='cut'?'#0a0000':type==='purify'?'#0a1208':'#080a06';
  ov.style.color=ending.col;
  ov.style.display='flex';ov.style.opacity='1';
  document.getElementById('end-title').textContent=ending.title;
  document.getElementById('end-title').style.color=ending.col;
  document.getElementById('end-text').style.color=ending.col;
  drawEndScene(type,0);
}

function drawEndScene(type,phase){
  const cv=document.getElementById('end-canvas');
  if(!cv)return;
  const c=cv.getContext('2d');
  c.clearRect(0,0,800,500);
  
  if(type==='protect'){
    // Forest scene - alive, birds, sunlight
    c.fillStyle='#0a1a08';c.fillRect(0,0,800,500);
    // Trees
    for(let i=0;i<12;i++){
      const tx=40+i*65,ty=200+Math.sin(i)*30;
      c.fillStyle='#3a2a10';c.fillRect(tx,ty,16,200);
      c.fillStyle=`hsl(${110+i*5},50%,${25+phase*2}%)`;
      c.beginPath();c.arc(tx+8,ty-20,30+Math.random()*10,0,Math.PI*2);c.fill();
    }
    // Sunbeams
    c.fillStyle='rgba(255,220,100,0.06)';
    for(let i=0;i<5;i++){c.beginPath();c.moveTo(200+i*120,0);c.lineTo(150+i*120,500);c.lineTo(250+i*120,500);c.fill()}
    // Primordial tree center
    c.fillStyle='#5a4020';c.fillRect(370,100,60,300);
    c.fillStyle='#2a6a2a';c.beginPath();c.arc(400,80,90,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,215,0,0.2)';c.beginPath();c.arc(400,80,70,0,Math.PI*2);c.fill();
  }else if(type==='cut'){
    // Dead forest - grey, stumps, cracked earth
    c.fillStyle='#1a1210';c.fillRect(0,0,800,500);
    // Dead stumps
    for(let i=0;i<15;i++){
      const tx=30+i*52;
      c.fillStyle='#3a3028';c.fillRect(tx,320,20,80);
      c.fillStyle='#2a2018';c.fillRect(tx-2,318,24,6);
    }
    // Cracked ground
    c.strokeStyle='#4a3a2a';c.lineWidth=2;
    for(let i=0;i<8;i++){
      c.beginPath();c.moveTo(Math.random()*800,350);
      c.lineTo(Math.random()*800,500);c.stroke();
    }
    // Grey sky
    c.fillStyle='rgba(80,70,60,0.3)';c.fillRect(0,0,800,200);
  }else{
    // Restoration - golden light, saplings growing, brilliant
    c.fillStyle='#0a1a08';c.fillRect(0,0,800,500);
    // Growing saplings
    for(let i=0;i<20;i++){
      const tx=20+i*40,h=30+Math.random()*60;
      c.fillStyle='#3a5a2a';c.fillRect(tx+4,350-h,8,h);
      c.fillStyle=`hsl(${100+Math.random()*30},60%,${40+Math.random()*20}%)`;
      c.beginPath();c.arc(tx+8,350-h-10,12+Math.random()*8,0,Math.PI*2);c.fill();
    }
    // Golden Primordial Tree
    c.fillStyle='#6a5020';c.fillRect(360,60,80,340);
    c.fillStyle='#3a8a3a';c.beginPath();c.arc(400,50,110,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,215,0,0.35)';c.beginPath();c.arc(400,50,90,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,255,200,0.15)';c.beginPath();c.arc(400,30,130,0,Math.PI*2);c.fill();
    // Golden particles
    c.fillStyle='rgba(255,215,0,0.6)';
    for(let i=0;i<30;i++){
      c.fillRect(100+Math.random()*600,50+Math.random()*300,3,3);
    }
  }
}

function advanceEnding(){
  if(!endingActive)return;
  const type=P._ending;
  const scenes=ENDINGS[type].scenes;
  if(endCharIdx<scenes[endPhase].text.length){
    endCharIdx=scenes[endPhase].text.length;
    document.getElementById('end-text').textContent=scenes[endPhase].text;
  }else{
    endPhase++;endTimer=0;endCharIdx=0;endTypeTimer=0;
    if(endPhase>=scenes.length){
      // Game over
      const ov=document.getElementById('ending-overlay');
      ov.style.transition='opacity 2s';ov.style.opacity='0';
      setTimeout(()=>{ov.style.display='none';endingActive=false},2000);
      return;
    }
    drawEndScene(type,endPhase);
  }
}

function updateEnding(){
  if(!endingActive)return;
  const type=P._ending;
  const scenes=ENDINGS[type].scenes;
  if(endPhase>=scenes.length)return;
  const scene=scenes[endPhase];
  endTypeTimer+=1/60;
  if(endCharIdx<scene.text.length && endTypeTimer>0.04){
    endTypeTimer=0;endCharIdx++;
    document.getElementById('end-text').textContent=scene.text.substring(0,endCharIdx);
  }
  endTimer+=1/60;
  if(endTimer>scene.dur && endCharIdx>=scene.text.length){
    endPhase++;endTimer=0;endCharIdx=0;endTypeTimer=0;
    if(endPhase>=scenes.length){
      document.getElementById('end-text').textContent='';
      return;
    }
    drawEndScene(type,endPhase);
  }
}

// ============ PURIFICATION KEYBIND (P key) ============

// ============ VILLAGE EVOLUTION ============
let _vilBarricade=false, _vilCarto=false, _vilAnthro=false;
function evolveVillage(){
  const VIL_Y=MH-12, CX=128;
  // Barricades after first corruption
  if(P._firstCorruption && !_vilBarricade){
    _vilBarricade=true;
    // Place barricades at village entrance (north edge)
    for(let x=CX-12;x<=CX+12;x++){
      const vy=VIL_Y;
      if(vy>=0 && vy<MH && x>=0 && x<MW){
        if(Math.abs(x-CX)>1 && (map[vy][x]===TT.G||map[vy][x]===TT.VL||map[vy][x]===TT.FL)){
          map[vy][x]=TT.BARR;
        }
      }
    }
    ft2(P.x,P.y-1,'Le village se barricade...','#8b4513');
  }
  // Cartographer arrives after reaching biome 2 (Foret Mixte)
  if(P._deepestBiome>=1 && !_vilCarto){
    _vilCarto=true;
    const cx=CX+10, cy=VIL_Y+5;
    if(cy<MH && cx<MW){
      map[cy][cx]=TT.CARTO;
      ft2(P.x,P.y-1.5,'Un cartographe a rejoint le village!','#4a90d9');
    }
  }
  // Anthropologist arrives after first sacred tree
  if(P._firstSacredTree && !_vilAnthro){
    _vilAnthro=true;
    const cx=CX-10, cy=VIL_Y+5;
    if(cy<MH && cx<MW){
      map[cy][cx]=TT.ANTHRO;
    }
  }
}

// ============ MAIN ============
let lt=0,mmT=0;
function loop(ts){
  const d=Math.min(.05,(ts-lt)/1000);lt=ts;
  
  // Intro cinematic
  if(introActive){updateIntro(d);requestAnimationFrame(loop);return;}
  
  if(!dead){gt+=d;if(!shopOn)dayPhase=(dayPhase+d*.001)%1} // time always advances, day/night pauses in shop

  updWind(d);updP2(d);updateDialogue(d);evolveVillage();  // Check corruption threshold for guardian alert
  if(!P._guardianAwake){
    let totalCorr=0,corrCount=0;
    for(let cy=0;cy<MH;cy+=4)for(let cx=0;cx<MW;cx+=4){
      totalCorr++;
      if(corr[cy]&&corr[cy][cx]>.2)corrCount++;
    }
    if(totalCorr>0&&corrCount/totalCorr>.35){
      P._guardianAwake=true;
      ft2(P.x,P.y-1,'La terre gronde... le Gardien s\'agite...','#8b0000');
      shake=.8;
      const pp=window._primPos||{x:64,y:10};
      spawnGuardian(pp.x,pp.y);
    }
  }
  if(!dead&&!shopOn){updCorr(d);updRegrow(d);updE(d);spawnE();updWolves(d);updWildlife(d);updFigurants(d);updParts(d);updGuardian(d);updBossEast(d);updBossWest(d);updBossEffects(d);checkLateralBosses();shake=Math.max(0,shake-d*4)}
  if(endingActive)updateEnding();
  if(editorOpen&&Math.floor(gt*2)%2===0)updateEdStats();

  // Target camera
  cam.x=P.x-VW/2;cam.y=P.y-VH/2;
  cam.x=Math.max(0,Math.min(MW-VW,cam.x));cam.y=Math.max(0,Math.min(MH-VH,cam.y));
  // Smooth camera
  smCam.x+=(cam.x-smCam.x)*Math.min(1,d*8);
  smCam.y+=(cam.y-smCam.y)*Math.min(1,d*8);

  const shX=shake>0?(Math.random()-.5)*shake*14:0,shY=shake>0?(Math.random()-.5)*shake*14:0;

  X.save();X.translate(shX,shY);
  X.fillStyle='#0a100e';X.fillRect(0,0,CV.width,CV.height);
  const stX=Math.floor(smCam.x),stY=Math.floor(smCam.y);
  for(let y=-1;y<=VH+1;y++)for(let x=-1;x<=VW+1;x++)dGround(x+stX-smCam.x,y+stY-smCam.y,stX+x,stY+y);

  const dl=[];
  for(let y=-8;y<=VH+8;y++)for(let x=-5;x<=VW+5;x++){const wx=stX+x,wy=stY+y;if(wx>=0&&wy>=0&&wx<MW&&wy<MH){const t=map[wy][wx];if(t!==TT.G&&t!==TT.PA&&t!==TT.VL&&t!==TT.WA)dl.push({tp:'t',x:wx,y:wy,sy:wy})}}
  dl.push({tp:'p',x:P.x,y:P.y,sy:P.y});
  ents.forEach(e=>dl.push({tp:'e',e,x:e.x,y:e.y,sy:e.y}));
  wolves.forEach(w=>dl.push({tp:'wlf',w,x:w.x,y:w.y,sy:w.y}));
  wildlife.forEach(w=>dl.push({tp:'w',w,x:w.x,y:w.y,sy:w.y}));
  dl.sort((a,b)=>a.sy-b.sy);
  dl.forEach(item=>{if(item.tp==='t')dObj(item.x,item.y);else if(item.tp==='p')dPlayer();else if(item.tp==='wlf')dWolves_single(item.w);else if(item.tp==='w')dWildlife_single(item.w)});
  dFigurants();dEnts();dParts2();dInteractPrompts();
  X.restore();

  dLighting();dFX();dUI();
  mmT+=d;if(mmT>.4){mmT=0;dMM()}
  requestAnimationFrame(loop);
}

initSprites();genMap();initFigurants();smCam.x=P.x-VW/2;smCam.y=P.y-VH/2;

// ============ INTRO CINEMATIC ============
let introActive=true;
let introPhase=0, introTimer=0, introTextIdx=0, introCharIdx2=0, introTypeTimer=0;
const INTRO_SCENES=[
  {text:"Un village au pied de la forêt. Paisible. Isolé.", dur:5.5},
  {text:"Ce matin-là, une carriole arrive du sud...", dur:5},
  {text:"Un homme en costume sombre descend. Son sourire est parfait.", dur:5.5},
  {text:"« Bonjour ! Je suis Aldric, émissaire de l'Entreprise. »", dur:5.5},
  {text:"« Nous avons une proposition... mutuellement bénéfique. »", dur:5},
  {text:"« Vous avez du bois. Nous avons de l'or. Simple, non ? »", dur:5},
  {text:"Ta grand-mère tousse dans son lit. Les remèdes coûtent cher.", dur:6},
  {text:"Tu prends la hache de ton grand-père. La forêt attend.", dur:5.5},
];

function drawIntroScene(phase){
  const ic=document.getElementById('intro-canvas');
  const ctx=ic.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#0a0e0a';ctx.fillRect(0,0,480,270);
  
  if(phase<=1){
    // Village scene — draw simple pixel art village
    // Sky gradient
    for(let y=0;y<120;y++){
      const t=y/120;
      ctx.fillStyle=`rgb(${Math.floor(15+t*25)},${Math.floor(20+t*15)},${Math.floor(40+t*20)})`;
      ctx.fillRect(0,y,480,1);
    }
    // Ground
    ctx.fillStyle='#2d5a3f';ctx.fillRect(0,180,480,90);
    ctx.fillStyle='#3a6a4f';ctx.fillRect(0,180,480,3);
    // Trees (background)
    for(let i=0;i<12;i++){
      const tx=15+i*40;
      ctx.fillStyle='#1a3a22';ctx.fillRect(tx+6,100,4,80);
      ctx.fillStyle='#2a5a38';ctx.beginPath();ctx.arc(tx+8,95,14,0,Math.PI*2);ctx.fill();
    }
    // Houses
    const houseX=[160,210,260];
    houseX.forEach((hx,i)=>{
      ctx.fillStyle='#8a7050';ctx.fillRect(hx,150,30,30);
      ctx.fillStyle='#6a5030';ctx.fillRect(hx-2,140,34,12);
      ctx.fillStyle='#5a4020';ctx.fillRect(hx+12,165,8,15);
      ctx.fillStyle='#4a8090';ctx.fillRect(hx+3,155,6,6);
    });
    // Path
    ctx.fillStyle='#9a8a60';ctx.fillRect(220,180,20,90);
  }else if(phase<=5){
    // Emissary arrival
    ctx.fillStyle='#1a1a28';ctx.fillRect(0,0,480,270);
    // Carriage
    const cx=120+Math.min(phase-2,2)*80;
    ctx.fillStyle='#3a3040';ctx.fillRect(cx,140,60,35);
    ctx.fillStyle='#2a2030';ctx.fillRect(cx+5,130,50,15);
    // Wheels
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(cx+12,180,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+48,180,8,0,Math.PI*2);ctx.fill();
    // Emissary figure
    ctx.fillStyle='#2a2a3a';ctx.fillRect(cx+65,150,10,25);
    ctx.fillStyle='#d8b898';ctx.fillRect(cx+67,142,6,10);
    ctx.fillStyle='#1a1a28';ctx.fillRect(cx+66,138,8,6);
    // Ground
    ctx.fillStyle='#2d5a3f';ctx.fillRect(0,185,480,85);
    ctx.fillStyle='#9a8a60';ctx.fillRect(0,185,480,3);
  }else{
    // Home scene — grandparent in bed
    ctx.fillStyle='#1a1208';ctx.fillRect(0,0,480,270);
    // Warm interior
    const gr=ctx.createRadialGradient(100,200,20,240,135,200);
    gr.addColorStop(0,'rgba(255,180,100,0.08)');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,480,270);
    // Bed
    ctx.fillStyle='#6a5030';ctx.fillRect(80,160,150,50);
    ctx.fillStyle='#8a4040';ctx.fillRect(85,165,140,40);
    // Figure in bed
    ctx.fillStyle='#d0c8b0';ctx.fillRect(85,155,30,12);
    ctx.fillStyle='#d4b898';ctx.fillRect(90,148,16,14);
    ctx.fillStyle='#d0d0cc';ctx.fillRect(88,144,20,8);
    // Candle
    ctx.fillStyle='#ff9900';ctx.fillRect(260,140,4,6);ctx.fillStyle='#ffcc44';ctx.fillRect(261,141,2,3);
    // Axe on wall
    ctx.fillStyle='#888';ctx.fillRect(320,120,4,40);ctx.fillStyle='#aaa';ctx.fillRect(314,118,16,8);
    // Player standing
    ctx.fillStyle='#52b788';ctx.fillRect(300,150,12,30);
    ctx.fillStyle='#d4b898';ctx.fillRect(302,140,8,12);
    ctx.fillStyle='#6a4020';ctx.fillRect(301,137,10,6);
  }
}

function updateIntro(d){
  const ic=document.getElementById('intro-cin');
  if(!ic||ic.style.display==='none')return;
  if(introPhase>=INTRO_SCENES.length){
    // Fade out
    ic.style.transition='opacity 0.8s';ic.style.opacity='0';
    setTimeout(()=>{ic.style.display='none';introActive=false;P._introSeen=true;},800);
    introPhase=999; // prevent re-trigger
    return;
  }
  drawIntroScene(introPhase);
  const scene=INTRO_SCENES[introPhase];
  const itxt=document.getElementById('intro-text');
  
  // Typing with controlled speed — ~14 chars/sec (one char every ~70ms)
  introTypeTimer+=d;
  if(introCharIdx2<scene.text.length && introTypeTimer>0.07){
    introTypeTimer=0;
    introCharIdx2++;
    itxt.textContent=scene.text.substring(0,introCharIdx2);
  }
  
  introTimer+=d;
  if(introTimer>scene.dur&&introCharIdx2>=scene.text.length){
    // Fade text between scenes
    itxt.style.transition='opacity 0.4s';itxt.style.opacity='0';
    setTimeout(()=>{itxt.style.opacity='1';itxt.style.transition='';},400);
    introPhase++;introTimer=0;introCharIdx2=0;introTypeTimer=0;
  }
}
function skipIntro(){
  if(!introActive||introPhase>=INTRO_SCENES.length)return;
  const scene=INTRO_SCENES[introPhase];
  if(introCharIdx2<scene.text.length){
    introCharIdx2=scene.text.length;
    document.getElementById('intro-text').textContent=scene.text;
    introTimer=Math.max(introTimer,scene.dur-1.5); // fast-forward hold time too
  }else{
    introPhase++;introTimer=0;introCharIdx2=0;introTypeTimer=0;
    if(introPhase>=INTRO_SCENES.length){
      const ic=document.getElementById('intro-cin');
      ic.style.transition='opacity 0.6s';ic.style.opacity='0';
      setTimeout(()=>{ic.style.display='none';introActive=false;P._introSeen=true;},600);
      introPhase=999;
    }
  }
}
document.getElementById('intro-cin').addEventListener('click',skipIntro);
// Also skip with space/enter
document.addEventListener('keydown',e=>{if(introActive&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();skipIntro()}});

// Auto-scale to fit viewport
function fitScreen(){
  const gc=document.getElementById('gc');
  const vw=window.innerWidth,vh=window.innerHeight;
  const cw=VW*T*SC,ch=VH*T*SC;
  const scale=Math.min(vw/cw,vh/ch,1);
  gc.style.transform=`scale(${scale})`;
}
fitScreen();
window.addEventListener('resize',fitScreen);

requestAnimationFrame(loop);
</script>
