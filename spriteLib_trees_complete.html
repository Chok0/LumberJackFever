<style>
@import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e0a;color:#d4e8d0;font-family:'DM Sans',sans-serif;min-height:100vh}
.grain{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
header{text-align:center;padding:32px 20px 20px;position:relative}
header::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,#2d6a4f,transparent)}
h1{font-family:'Silkscreen',monospace;font-size:clamp(18px,3vw,30px);color:#52b788;text-shadow:0 0 30px rgba(82,183,136,.3);letter-spacing:2px;margin-bottom:4px}
.sub{font-size:11px;color:#6b8a7a;letter-spacing:3px;text-transform:uppercase}
.ctrls{display:flex;justify-content:center;align-items:center;gap:12px;padding:14px;flex-wrap:wrap}

.btn{background:#1b3325;color:#52b788;border:1px solid #2d6a4f;font-family:'Silkscreen',monospace;font-size:10px;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all .2s}
.btn:hover,.btn.active{background:#2d6a4f;color:#d8f3dc}

.biome-hdr{font-family:'Silkscreen',monospace;font-size:12px;color:#40916c;margin:24px 0 12px;display:flex;align-items:center;gap:10px;border-top:1px solid #1b332544;padding-top:16px}
.biome-hdr::after{content:'';flex:1;height:1px;background:#1b332544}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;justify-content:flex-start}

.card-lbl{font-family:'Silkscreen',monospace;font-size:8px;color:#52b788;margin-bottom:6px;letter-spacing:1px}
.cw{background:#162e22;border-radius:5px;padding:8px;display:inline-block}
.cw canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
.card-sp{font-size:8px;color:#3a5a4a;margin-top:4px}
.info{background:linear-gradient(135deg,#0f1a1488,#1b332544);border:1px solid #1b3325;border-radius:8px;padding:14px;margin:20px auto;max-width:800px;font-size:11px;line-height:1.6;color:#7a9a8a}
.info strong{color:#52b788}
</style>

<body>
<div class="grain"></div>
<header>
  <h1>🪓 SPRITELIB — 22 ARBRES HD</h1>

<div class="info">
  <strong>22 espèces</strong> réparties sur 6 biomes — Lisière (3), Mixte (4), Ancienne (2), Primordiale (2), 
  Marécage (5), Boréal (4) + 2 spéciaux (Sacré, Érable ondé). 
  Toutes construites à partir du même set de primitives factorisées.
</div>

<script>
// ============================================================
// SPRITELIB COMPLETE — ALL 22 TREES
// ============================================================
const SL=(()=>{
const px=(c,x,y,cl)=>{c.fillStyle=cl;c.fillRect(x,y,1,1)};
const rc=(c,x,y,w,h,cl)=>{c.fillStyle=cl;c.fillRect(x,y,w,h)};
function sr(s){return()=>{s=(s*9301+49297)%233280;return s/233280}}
function dk(c,f){const[r,g,b]=pc(c);return`rgb(${Math.max(0,r*f|0)},${Math.max(0,g*f|0)},${Math.max(0,b*f|0)})`}
function lt(c,f){const[r,g,b]=pc(c);return`rgb(${Math.min(255,r*f|0)},${Math.min(255,g*f|0)},${Math.min(255,b*f|0)})`}
function pc(c){if(c[0]==='#')return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];const m=c.match(/(\d+)/g);return m?[+m[0],+m[1],+m[2]]:[0,0,0]}

// --- Shapes ---
function fE(c,cx,cy,rx,ry,cl){for(let y=-ry;y<=ry;y++){const hw=Math.floor(rx*Math.sqrt(Math.max(0,1-y*y/(ry*ry))));if(hw>=0)rc(c,cx-hw,cy+y,hw*2+1,1,cl)}}
function gSh(c,cx,y,rx,ry){fE(c,cx,y,rx,ry,'rgba(8,20,12,0.18)');fE(c,cx,y,rx*.85|0,ry*.8|0,'rgba(8,20,12,0.10)')}

// --- Canopy blob ---
function cB(c,cx,cy,rx,ry,p,o={}){
  const sd=o.seed||42,rng=sr(sd),wF=o.wF||3,wA=o.wA||.12,wA2=o.wA2||.06;
  const N=64,R=[];for(let i=0;i<N;i++){const a=i/N*Math.PI*2;R.push(1+Math.sin(a*wF+sd)*wA+Math.sin(a*(wF+2)+sd*2)*wA2)}
  for(let y=-ry-4;y<=ry+4;y++)for(let x=-rx-4;x<=rx+4;x++){
    const ag=Math.atan2(y,x),ai=((ag/(Math.PI*2))*N+N)%N,i0=ai|0,i1=(i0+1)%N,t=ai-i0;
    const lR=R[i0]*(1-t)+R[i1]*t,d=Math.sqrt(x*x/(rx*rx)+y*y/(ry*ry));
    if(d>lR)continue;
    const ld=Math.sqrt((x+rx*.3)**2+(y+ry*.3)**2)/Math.sqrt(rx*rx+ry*ry);
    let cl;if(ld<.35)cl=p.h;else if(ld<.6)cl=p.l;else if(y>ry*.2)cl=p.s;else cl=p.b;
    if(d>lR-.12)cl=p.s;px(c,cx+x,cy+y,cl);
  }
  if(o.ec!==false){const cnt=o.ec||28;for(let i=0;i<cnt;i++){
    const a=i/cnt*Math.PI*2,ai=((a/(Math.PI*2))*N+N)%N,i0=ai|0,i1=(i0+1)%N,t=ai-i0;
    const lR=R[i0]*(1-t)+R[i1]*t;
    const lx=Math.round(cx+Math.cos(a)*rx*lR),ly=Math.round(cy+Math.sin(a)*ry*lR);
    const cl=(a>Math.PI*.7&&a<Math.PI*1.9)?p.l:p.b;
    for(let j=0;j<2+(rng()*2|0);j++){px(c,lx+Math.round(Math.cos(a+j*.4)*(1+rng()*1.5)),ly+Math.round(Math.sin(a+j*.4)*(1+rng())),cl)}
  }}
}
function cBs(c,cx,cy,rx,ry,p,o={}){cB(c,cx,cy,rx,ry,{s:p.s,b:p.s,l:p.s,h:p.s},{...o,ec:false})} // shadow-only blob

// --- Conifer layers ---
function coniferLayers(c,CX,layers,pal,o={}){
  for(const L of layers){
    const tipY=L.y,baseY=L.y+L.h;
    // Shadow
    for(let y=tipY+2;y<baseY+2;y++){const p=(y-tipY)/L.h,hw=L.w/2*p|0;rc(c,CX-hw+2,y,hw*2,1,pal.s)}
    // Main with zone shading
    for(let y=tipY;y<baseY;y++){const p=(y-tipY)/L.h,hw=L.w/2*p|0;
      for(let x=-hw;x<=hw;x++){const xn=(x+hw)/(hw*2||1);
        let cl;if(xn<.3)cl=pal.b;else if(xn<.55)cl=pal.l;else if(xn<.7)cl=pal.h;else cl=pal.b;
        if(p>.85)cl=pal.s;px(c,CX+x,y,cl);
      }
      // Edge notches
      if(y%4===0&&hw>4){px(c,CX-hw+1,y,pal.s);px(c,CX+hw-1,y,pal.s);
        if(y%8===0&&o.needles!==false){px(c,CX-hw-1,y,pal.b);px(c,CX+hw+1,y,pal.b)}}
    }
  }
}

// --- Trunk ---
function dT(c,cx,yT,yB,bW,p,o={}){
  const fl=o.flare||0;
  for(let y=yT;y<yB;y++){const pr=(y-yT)/(yB-yT),f=pr*pr*fl|0,lx=cx-(bW/2|0)-f,rx=cx+(bW/2|0)+f,w=rx-lx;
    for(let x=lx;x<rx;x++){const xn=(x-lx)/w;let cl;if(xn<.15)cl=p.s;else if(xn<.35)cl=p.b;else if(xn<.6)cl=p.l;else if(xn<.8)cl=p.b;else cl=p.s;px(c,x,y,cl)}
    if(o.furrows&&w>8){const sp=o.fSp||6;for(let fx=lx+3;fx<rx-3;fx+=sp)px(c,fx,y,p.s)}
  }
}

// --- Multi-stem ---
function dMS(c,cx,yB,stems,p){
  for(const s of stems){const sx=cx+(s.ox||0),sy=s.sy||(yB-40);
    for(let y=sy;y<yB;y++){const w=s.w||5,lx=sx-(w/2|0);for(let x=lx;x<lx+w;x++){const xn=(x-lx)/w;px(c,x,y,xn<.25?p.s:xn<.65?p.l:p.b)}}
  }
}

// --- Details ---
function bMarks(c,cx,yT,yB,tW,sd){const r=sr(sd||42);for(let y=yT;y<yB;y++){const lx=cx-(tW/2|0);if(y%7===0){const mw=4+(r()*5|0),mx=lx+2+(r()*(tW-mw-2)|0);rc(c,mx,y,mw,1,'rgba(80,65,50,0.55)')}if(y%11===3){const mw=3+(r()*3|0),mx=lx+2+(r()*(tW-mw-1)|0);rc(c,mx,y,mw,1,'rgba(90,75,60,0.4)')}}}
function pBark(c,cx,yT,yB,tW,sd){const r=sr(sd||55),lx=cx-(tW/2|0),rx2=cx+(tW/2|0);[.3,.55,.75].forEach(p2=>{const py=yT+(yB-yT)*p2|0;if(r()>.4){px(c,lx-1,py,'#e8e0d0');px(c,lx-1,py+1,'#ddd4c4')}if(r()>.4){px(c,rx2,py+3,'#ddd4c4');px(c,rx2,py+4,'#d4c8b8')}})}
function dKnot(c,x,y,sz){const cs=['#5a4a38','#6b5a48','#7a6a58','#8a7a68'];for(let dy=-sz;dy<=sz;dy++)for(let dx=-sz;dx<=sz;dx++){const d=Math.sqrt(dx*dx+dy*dy);if(d<=sz)px(c,x+dx,y+dy,cs[Math.min(3,d|0)])}px(c,x,y,'#4a3a28')}
function dRoots(c,cx,yB,tW,cl,cl2,sz){const lens={s:[5,3],m:[8,5,3],l:[12,8,5]}[sz||'m'];for(const s of[-1,1])for(let r=0;r<lens.length;r++){const rx=cx+s*((tW/2|0)+2+r*5),ry=yB-2-r*2,rL=lens[r],rH=Math.max(2,4-r),sx=s===1?rx:rx-rL;rc(c,sx,ry,rL,rH,cl);rc(c,sx+(s===1?0:1),ry,rL-1,1,cl2)}}
function dMoss(c,cx,y,w,o={}){const h=o.h||3;rc(c,cx-(w/2|0),y,w,h,o.c||'#2d6a4f');rc(c,cx-(w/2|0)+1,y+1,w-2,1,o.cl||'#40916c')}
function dBr(c,brs,cl,clH){for(const b of brs)for(let t=0;t<b.len;t++){const bx=Math.round(b.x+b.dx*t),by=Math.round(b.y+b.dy*t),th=Math.max(1,(b.th||2)-(t/(b.tp||7)|0));rc(c,bx,by,th>1?2:1,th,cl);if(th>1&&clH)px(c,bx+1,by,clH)}}
function dCatkins(c,pos,sd){const r=sr(sd||88),cs=['#c8b060','#b8a050','#a89040','#d0c070'];for(const[x,y]of pos){const len=3+(r()*3|0);for(let i=0;i<len;i++){const sw=Math.round(Math.sin(i*.8+sd)*.8);px(c,x+sw,y+i,cs[i%4]);if(i>0&&i<len-1)px(c,x+sw+1,y+i,cs[(i+1)%4])}}}
function dCones(c,pos){for(const[x,y]of pos){px(c,x,y,'#5a3828');px(c,x,y+1,'#4a2818');px(c,x+1,y,'#6a4838');px(c,x,y+2,'#3a1e10')}}
function dMush(c,x,y){rc(c,x,y,2,2,'#a08060');rc(c,x-1,y-1,4,1,'#c8a878');px(c,x,y-2,'#d4b888');px(c,x+1,y-1,'#e8d8c0')}
// Berries
function dBerries(c,pos,cl='#cc2020'){for(const[x,y]of pos){px(c,x,y,cl);px(c,x+1,y,dk(cl,.8));px(c,x,y+1,dk(cl,.6))}}
// Shelf fungus
function dFungus(c,x,y){rc(c,x,y,5,2,'#8a7a5a');rc(c,x+1,y,3,1,'#a89a7a');px(c,x+3,y,'#b0a080')}
// Crystal growths
function dCrystals(c,pos,cl='#a0c0d0'){for(const[x,y]of pos){px(c,x,y,cl);px(c,x+1,y-1,lt(cl,1.15));px(c,x,y-2,dk(cl,.85));px(c,x+1,y-3,cl)}}
// Sparkle dots
function dSparkle(c,pos){for(const[x,y]of pos){px(c,x,y,'#FFFFFF');px(c,x+1,y,'#FFFFF0');px(c,x,y-1,'rgba(255,255,255,0.4)')}}
// Golden vein on trunk
function dGoldVeins(c,cx,yT,yB,w){for(let y=yT;y<yB;y++){const n=Math.sin(y*2.7+11)*43758.5;if((n-Math.floor(n))>.55){px(c,cx,y,'#B8860B');px(c,cx+1,y,'rgba(218,165,32,0.4)')}}}
// Spanish moss strands
function dSpMoss(c,pos,len){for(const[x,y]of pos){for(let i=0;i<len;i++)px(c,x+Math.round(Math.sin(i*.5)*.5),y+i,`rgba(160,180,140,${.5-i/(len*2)})`)}}
// Rune carvings
function dRunes(c,pos){const gc=['#FFD700','#DAA520','#E8C030','#FFF8DC'];for(let i=0;i<pos.length;i++){const[x,y]=pos[i];rc(c,x,y,3,2,gc[i%4]);px(c,x+1,y+1,'#B8860B');px(c,x-1,y-1,'rgba(255,215,0,0.15)')}}
// Small flowers on canopy
function dFlowers(c,pos,cl){for(const[x,y]of pos){px(c,x,y,cl);px(c,x+1,y,cl)}}

// --- Palettes ---
const P={
  birchB:{s:'#b8a88c',b:'#ddd4c0',l:'#ece4d4',h:'#f4ecdc'},
  birchL:{s:'#2d6a4f',b:'#52b788',l:'#74c69d',h:'#a8dca4'},
  hazelB:{s:'#4a3420',b:'#7a5a30',l:'#8a6a38',h:'#9a7a48'},
  hazelL:{s:'#2a6030',b:'#60b858',l:'#7acc70',h:'#a8e8a0'},
  alderB:{s:'#2a1810',b:'#4a3020',l:'#5a3828',h:'#6a4838'},
  alderL:{s:'#0f3018',b:'#1a5a2a',l:'#2a6a3a',h:'#4a8a5a'},
  oakB:{s:'#3a1e08',b:'#6B4226',l:'#8a6040',h:'#a07850'},
  oakL:{s:'#0a1a10',b:'#1b4332',l:'#2d6a4f',h:'#40916c'},
  mapleB:{s:'#3a2010',b:'#6B4226',l:'#7A5033',h:'#9a7050'},
  mapleL:{s:'#1e4420',b:'#4a9a50',l:'#6aba60',h:'#90d888'},
  pineB:{s:'#5a2a15',b:'#8a4a28',l:'#9a5a30',h:'#aa6a38'},
  pineL:{s:'#0a2810',b:'#1a5a28',l:'#2d6a40',h:'#3d8b5e'},
  ashB:{s:'#5a5a52',b:'#8a8a80',l:'#a0a098',h:'#b0b0a8'},
  ashL:{s:'#254a28',b:'#4aaa58',l:'#6ac878',h:'#90e898'},
  beechB:{s:'#787870',b:'#909088',l:'#a8a8a0',h:'#b8b8b0'},
  beechL:{s:'#0a2810',b:'#1a4a28',l:'#2a5838',h:'#3a6a48'},
  yewB:{s:'#1a1008',b:'#3a2818',l:'#4a3820',h:'#5a4830'},
  yewL:{s:'#051008',b:'#1a3a18',l:'#2a4a28',h:'#3a5a38'},
  lindenB:{s:'#5a4830',b:'#7a6848',l:'#8a7858',h:'#9a8868'},
  lindenL:{s:'#1e4418',b:'#4a9a30',l:'#6aba50',h:'#8ada70'},
  seqB:{s:'#5a1808',b:'#8a3020',l:'#9a3828',h:'#aa4838'},
  seqL:{s:'#051008',b:'#1a3818',l:'#2a4a28',h:'#3a5a38'},
  petB:{s:'#6a6a62',b:'#8a8880',l:'#a8a8a0',h:'#c0c0b8'},
  ebonyB:{s:'#080606',b:'#1a1414',l:'#2a2020',h:'#3a2a2a'},
  ebonyL:{s:'#081008',b:'#1a2a18',l:'#2a3a28',h:'#3a4a38'},
  roseB:{s:'#3a1828',b:'#5a2a3a',l:'#6a3a48',h:'#7a4a58'},
  roseL:{s:'#1a1820',b:'#3a2a48',l:'#4a3a58',h:'#6a5a78'},
  cypB:{s:'#2a3018',b:'#3a4a2a',l:'#4a5a3a',h:'#5a6a48'},
  cypL:{s:'#0a1808',b:'#1a3a18',l:'#2a4a28',h:'#3a5a38'},
  manB:{s:'#2a2010',b:'#3a3020',l:'#4a3a28',h:'#5a4a38'},
  manL:{s:'#0a1808',b:'#1a3a1a',l:'#2a4a28',h:'#3a5a38'},
  spruceL:{s:'#0a2008',b:'#183a18',l:'#285028',h:'#386838'},
  larchL:{s:'#1a3810',b:'#3a7a28',l:'#5a9a40',h:'#7aba58'},
  firL:{s:'#081808',b:'#143218',l:'#1e4828',h:'#2a5a38'},
  pbB:{s:'#a89880',b:'#d4c8b0',l:'#e0d8c0',h:'#ece4d4'},
  pbL:{s:'#1a3818',b:'#3a7a38',l:'#5a9a58',h:'#7aba78'},
  eroB:{s:'#4a3818',b:'#6a5028',l:'#7a6038',h:'#8a7048'},
  eroL:{s:'#1a2808',b:'#4a6a18',l:'#6a8a28',h:'#8aaa48'},
  gold:{s:'#8B6914',b:'#DAA520',l:'#FFD700',h:'#FFF8DC'},
  palB:{s:'#2a1018',b:'#4a2028',l:'#5a2838',h:'#6a3848'},
  palL:{s:'#0a0810',b:'#1a1828',l:'#2a2838',h:'#3a3848'},
};

// ============ TREE DEFINITIONS ============
const T={};
// --- Utility to define trees compactly ---
function defTree(k,name,w,h,drawFn){T[k]={name,w,h,draw:drawFn}}

// ===== LISIÈRE =====
defTree('bou','Bouleau',144,208,(c,w,h)=>{
  const CX=w/2|0,tT=h*.44|0,tB=h-18,tW=14;
  gSh(c,CX,h-14,26,6);dT(c,CX,tT,tB,tW,P.birchB,{flare:4});bMarks(c,CX,tT,tB,tW,42);pBark(c,CX,tT,tB,tW,55);
  dKnot(c,CX+2,tT+(tB-tT)*.5|0,2);dRoots(c,CX,tB,tW,'#c8bca0','#ddd4c0','s');dMoss(c,CX,tB-7,tW+2);
  dBr(c,[{x:CX-6,y:tT+10,dx:-1.2,dy:-.5,len:14,th:2},{x:CX+6,y:tT+6,dx:1.1,dy:-.6,len:18,th:2},{x:CX-4,y:tT+20,dx:-1.4,dy:-.3,len:10,th:2},{x:CX+5,y:tT+16,dx:1.3,dy:-.4,len:12,th:2}],'#c8bca0','#ddd4c0');
  const cY=h*.22|0,cRX=w*.34|0,cRY=h*.2|0;cBs(c,CX+2,cY+3,cRX+2,cRY+2,P.birchL,{seed:42});
  cB(c,CX,cY,cRX,cRY,P.birchL,{seed:42,wF:4,wA:.1});dMush(c,CX+(tW/2|0)+7,tB+3);
});

defTree('noi','Noisetier',144,208,(c,w,h)=>{
